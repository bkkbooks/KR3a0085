body:
  text: 讀書劄記卷八明徐問撰或問春秋魯隱公元年書春王正月孔子無位而改正朔非尊周以大一統之義曰胡傳已言之矣周天子政令不行徒有空名微於列國諸侯史官之職盡廢孔子非史官也因魯史舊文而斷以己意自成一家之言以繫斯文綱常命脈於一線將絶之際故曰其義則丘竊取之亦自知後世當有罪之者罪之非知其心也蓋書元正始莫重於天時莫尊於王莫過於夏時之正舉春秋所以正時也一言而衆理具法亦寓焉所謂如造化簡易而微妙無窮者也然三正通於民俗而四時之序則斷不可易或謂周建子以仲冬為春孔子以為正月其説誤矣胡傳以為春秋王朝公卿書官王大夫列國命大夫諸侯之兄弟中國之附庸例稱字上士中士書名下士書人其常也凡王大夫諸侯或黜而書名書人如隱元年書天王使宰咺來歸惠公仲子之賵桓七年書榖伯綏鄧侯吾離來朝十五年邾人牟人葛人來朝大夫或進而書字閔元年公及齊侯盟于落姑季子來歸以寓褒貶其變也亦有不盡然者或沿舊史或先儒承闕而不敢增而聖人用意深微有非後儒所能窺測而盡得之者要在發明大義若其疑則不必強為之説可也傳曰國之將興聽於人將亡聽於神春秋之盟非搆私讎以講解則合黨與而連爭且歃血要神皆捨正道而廢王法詩曰君子屢盟亂是用長胡氏所謂凡書盟者皆惡之良得聖人之心矣惟成公七年楚伐鄭晉合八國盟於馬陵以救鄭而外楚襄公二十年晉合十一國盟於澶淵聞齊侯卒而不伐其喪故皆無譏焉春秋示後世以遇天變而謹懼者如隱三年書日有食之桓三年書日有食之既共凡三十六莊七年恆星經星不見夜中星隕如雨文十四年有星孛入于北斗哀十三年有星孛於東方昭十七年有星孛于大辰大火心星僖十六年隕石星隕為石于宋五是月六鷁退飛過宋都風逆而飛桓十四年無氷成三年新宫災天火為災定二年兩觀災哀三年桓宫僖宫災僖三十三年隕霜不殺草李梅實文九年地震僖十四年沙鹿山名在晉地崩成五年梁山崩文三年雨螽于宋之類是也有遇災而警備者書夏螟書螽書蝝螽子生書大水大飢大雨雹大雩雩祭旱諸侯雩天子大雩是也有因物變而紀異者莊十八年秋有􅈮江水怪含沙射人致病魯無昭二十五年有鸜鵒來巢鸜鵒不踰濟魯在汶南舊無是也有重民力而書不時者如書隱夏城中丘城郎僖春新作南門桓秋大閲閲車徒備齊周禮中冬大閲哀夏築蛇淵囿縱般樂等是也聖人為時君修政恤民之慮逺矣春秋之旨有直書而義自見者桓十八年曰公會齊侯于濼在今歷城縣公與夫人薑氏遂如齊夏四月丙子公薨于齊莊公元年三月夫人孫音遜于齊所以著夫人以亂而與弒且奔也有曲其辭而意盡者成公十四年曰秋叔孫僑如如齊逆女九月僑如以夫人婦薑氏至自齊大夫使尊君故稱族尊夫人故又稱氏姑在故又稱婦大夫不以夫人傳曰春秋之稱微而顯志而晦婉而成章盡而不汚懲惡而勸善非聖人誰能修之禮凡諸侯之適子誓於天子繼立以士服入見而受命薨則赴於君曰君之臣某死天子之哭諸侯則大宗伯為上相司服為王制服爵辨經䊷音緇衣或使有司哭之殯又使人隧葬必賵之示恩義也諸侯之夫人亦有赴賵之禮春秋時禮法盡廢故有書年不書即位書天王使某來錫命沒不書薨書名書卒或不書葬天王崩不為奔喪書來求賻諸侯之嬖妾喪書天王歸賵春秋皆從削而貶之以存君臣嫡庶王法綱常於既滅故曰知我者其惟春秋乎罪我者其惟春秋乎孔子每不滿於魯郊宣三年書春郊牛之口傷改卜牛牛死乃不郊猶三望祭山川也成七年鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免放也牛襄七年夏四月三卜郊不從乃免夏四月四卜郊不從乃不郊魯以諸侯郊祀上帝非禮甚矣知卜之於神不從而始免牛免郊惜乎不知卜之於心卜之於理也獨不能卜之於人乎蓋雖有孔子而卒不能用也春秋於衛州吁宋宋萬宋督晉里克楚世子商臣齊商人鄭公子歸生齊崔杼陳乞衛寧喜蔡世子般許世子止輩直書曰弒其君某禮臣弒君子弒父凡在官在宫者皆殺無赦故明書之使知夫人皆可以討亂賊莫可逃也春秋謹華夷之辨故隱公二年首書公會戎於潛八月公及戎盟于唐以著搆戎猾夏之漸也其後狄遂侵鄭侵齊伐莒又侵我西鄙至成公二年楚遂專中國之盟與公及諸侯國卿盟於蜀故首書公尊中國以辨夷自秦以下皆書人其貶深矣孟子曰春秋無義戰義如蠻狄猾夏盜賊姦宄臣子篡弒之類方伯諸候奉王命而伐之六師九伐乃大司馬所執諸侯不得而專之也周天子征伐不行自諸侯出互相攻取非利其土地通其貨賂則合其黨與固其私援故其書法自伐之外曰侵曰戰曰圍曰入曰遷曰滅曰敗曰取曰襲曰追曰戍曰以皆所謂無義戰而正其輕重之罪者也曰彼善於此只是齊桓因狄伐邢而救之滅衛而存之召陵責楚包茅不貢可豫也若晉文踐土之盟乃召王以諸侯見其定王室之亂則請隧因與以陽樊溫原攢茅之田乘時射利所書皆一罪案耳五霸孟子稱齊桓公為盛以五命辭有先王遺法孔子只稱管仲之功蓋仲之霸業在於尊王故召陵責楚之言皆翼戴王室諸侯信之翕然宗齊實仲假仁之功亦桓之能任仲也及其存衛而城楚丘則為専封內嬖而如夫人則為並嫡是五命之禁桓已先犯之矣故楚得以滅黃狄得以侵衛侵鄭夷狄猾夏遂為盟主蓋仲死而桓卒莫之能救也是知正心修身致於王道皆聖賢所長而霸者君臣之所短徒能稍震一時而源頭弗清無救於末流之禍矣况晉文以下又以貪詐慘黷行之哉故孔門之徒羞稱五霸宋襄不鼓不成列不禽二毛若假仁者而用鄫子於次雎之社以祀妖神其頑冥慘酷甚矣宜其強霸之榮不足贖虜亡之辱也董子以有國君臣父子皆不可不知春秋春秋有誅意之法人臣有無將之戒蓋一念背理則惡逆隨之易所以戒履霜也春秋雖誅亂臣賊子於既死實所以戒將來人心之動於幾微使知毫釐積慮之差即成大惡而不可以不謹焉非必皆有篡弒之事也歐陽氏論公羊高穀梁赤左丘明三子其傳春秋不能無失經於魯隱公之事書曰公及邾儀父盟于蔑其卒也書曰公薨三子者曰非公也是攝也晉靈公之事孔子書曰趙盾弒其君夷皋三子者曰非趙盾也是趙穿也許悼公之事孔子書曰許世子止弒其君買三子曰非弒之也買病死而止不嘗藥耳學者不從孔子而從三子信以為然且謂息姑之攝會盟征伐賞刑祭祀魯人皆聽命名實在已不為攝趙穿首罪必不宥為善人而加盾無辜以大惡兼以父病躬進藥而不嘗與不躬進藥操刃以殺其父三者論罪殊科愚初以為然及觀董子語臣子不通春秋之罪然後知聖人責人以綱常大義而示以謹微慮始之明鑒也夫隱初欲讓國而居攝立不以正又不受命於天子故不書即位以寓貶於法為公而書公者臣子所稱於君父及桓弒而書薨皆為魯桓諱惡如以昭公為知禮者也若趙盾驟諌靈公君臣交惡而出奔趙穿遂弒之盾不特與聞乎故也直假乎穿之手耳至許世子止為君冡嗣罔知君父為重病不嘗藥而輕以其命試之則雖哀毁絶粒夫何救於父之死哉三傳紀其迹而孔子執其斷亦不甚害乎其為同也但歐公時胡傳未出學者喜為新説雜用三傳雖以公之辨論而不求聖人之心惟文定得其旨矣左傳有考據有詞藻但事多傳疑雜以怪誕不經猶未能信之於理至以鬻拳以兵懼楚文王為愛君趙宣子以意弒靈公為良大夫其文駁矣愚謂禮記皆傳古先格言凡為禮者記之如禮儀三百曲禮三千皆是綱領節目使漢儒知禮各本其所自出分記類聚更加謹嚴不敢以已意率易竄入則後世不疑其亂經苦其煩而多其議也即如曲禮首章何等嚴重古典次章雖窒欲之事覺血脈不續索無味矣後世必有作者以周禮儀禮禮記三書所載禮樂參互簡取列為經傳煩者刪之彚成一書則可與四經並傳於無窮矣程子曰禮記雜出於漢儒然其間傳聖門緒餘及格言甚多如禮記樂記之類可無議者檀弓表記坊記之類亦甚有至理惟知言者擇之如王制禮運禮器亦多傳古意朱子曰漢儒惟董仲舒最純莫如三策何嘗有禮記中説話來如樂記所謂天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒何曽説到這裏必是古流傳此箇文字虙氏曰禮記乃儀禮之傳儀禮有冠昏鄉飲燕聘禮禮記有冠昏鄉飲燕聘義以釋之但周禮儀禮皆周公所作而禮記則漢儒所録亦儀禮之流也何以言之周禮雖得之河間獻王時無有傳之者武帝以為末世瀆亂之書何休以為六國隂謀之書至於漢末乃行于世惟儀禮漢初已行故高堂生傳之蕭奮蕭奮傳之孟卿孟卿傳之后蒼后蒼傳之戴聖二戴因習儀禮而録禮記故知儀禮之流也曲禮曰凡與客入者每門讓於客客至寢門則主人請入為席布席然後出迎客客固辭主人肅客俯手揖之所謂肅拜而入主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階主人與客讓登主人先登客從之拾級聚足連步以上拾級陟階之級連步步相繼也上於東階則先右足上於西階則先左足各順門之左右愚按請入為席今禮無之但整席亦是入門左右與東階西階世之士夫多講不同然亦自明白入門中門也左右階以賔主耦行為言入右所以趨東階入左所以趨西階至入寢門則主人自應東立近下西向客西立近上東向為禮蓋鄉飲士相見禮皆以客尊西位也今入寢門請客就東而主就西則主反在客左客反在主右安得行時客左而入反居右乎皆非禮矣至於坐客南面位而主就北面位則為君臣之禮如曰北面事之尤失所據今欲稍從俗猶存古禮則改正入寢門東西之禮請客坐西南向主坐東北向次客則坐東南向如僎以附賔亦可通也曲禮曰天子以犧牛諸侯以肥牛大夫以索牛士乃以羊豕是言諸侯大夫祭皆太牢也王制曰天子社稷皆太牢諸侯社稷皆少牢又曰諸侯無故不殺牛則與曲禮牲殺及本文皆抵牾矣又天子諸侯宗廟之祭春曰祀夏曰禘秋曰嘗冬曰蒸是言禘祭天子諸侯之所同也又曰諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿是比天子祭闕四時之一也而與前四祭之説又不同矣漢去周未逺諸儒考索注記必稽典籍不王不禘之説何相戾與魯以成王賜祭周公以天子禮樂孔子猶曰禘自既灌而往者吾不欲觀之矣近而其言尤可徴也橫渠以為作記者假其名以見時祀之數愚謂名稱所關禮之大分豈可混而無别乎抑或禘祭常行於夏商諸侯至周始有定制以為天子之禮記者仍例執兼舉而互言之耳其書不出一手每有異同學者自當識别月令吕不韋集諸説所著記十二月之候見先王欽若以行政令與唐虞厯象授時齊政之意同魯文公元年閏三月置閏差春秋傳曰非禮也先王之正時也履端於始以十一月甲子朔夜半冬至為一元五星皆起於牽牛初度更無餘分推以比為端故云舉正於中春分夏至秋分冬至謂之中氣歸餘於終置閏以氣盈朔虛而歸日月之餘分以置閏蓋戰國儒者猶能知之國語單襄公聘宋過陳火十月大火之次朝覿矣道茀多草不可行也候候人不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹膳宰不致餼司里不授館國無寄寓縣無施舍歸告王曰先王之教雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁而陳廢之知靈公之將亡也月令所紀蓋有所本矣但王者居處有常與服物色有制澤梁無禁警蹕以時其敬天授時順時行政中和之德流通兩間雖未有戾乎天時而決不以形迹儀文之末而屑屑求合也所謂居青陽太廟明堂總章左右南北每遷其所車旗衣服各用方色恆變其制揆之帝王軌度章物以一瞻視恐未必然周禮冬官漁人獻王鮪為魚薧曰祭祀賔客喪紀征魚蓋有貢無賦今曰賦及水泉陂澤亦恐後世多方取民非王政無禁之法也昔魯隱公欲往觀魚於棠臧僖伯諌之以為山林川澤之實器用之資皂𨽻之事官司之守非君所及也彼諸侯且爾乃謂天子親往嘗魚豈不戾哉愚觀孟夏命太尉贊俊傑太尉官名自秦始不韋蓋欲以秦法而參先王之教學者宜慎擇之王制天子諸侯無事則嵗三田獵以取獸田不以禮取有品制曰暴天物書曰暴殄天子不合圍四靣圍之諸侯不掩羣掩襲獺祭魚然後虞人入澤梁絶水取魚獺祭魚孟春之候豺祭獸然後田獵豺祭獸季秋之月也鳩化為鷹仲秋之候然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛獸子不卵不殺胎不夭夭禽獸之稚不覆巢國語魯宣公夏濫于泗淵里革斷其罟而棄之曰古者大寒降土蟄發水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也鳥獸孕水蟲成獸虞於是乎禁置羅矠魚鱉以為夏稿助生阜也烏獸成水蟲孕水虞於是乎置置䍡設穽鄂以實廟庖畜功用也且夫山不槎蘖澤不伐夭魚禁鯤鮞魚子獸長麑鳥翼鷇卵蟲舍蚳蝝蕃庶物也愚觀先王以其中正和平敬用五事以建惟皇之極所以制禮作樂吻合造化感通神人成位天地而茂對時育物至於法制猶能仁及昆蟲草木制其品節時其取用禁其暴殄捐其細纎以阜蕃息以助生化其所以曲成裁輔之道又無不用其極王道備矣宜其至和薰蒸兩間既無散陽亦無滯隂三光順次隂陽序調寒暑適節風雨時至天無震颷霜雹水旱之災民無疾癘夭札之患山川無童涸崩竭之變生類無胎殰卯殈之虞蓋其氣和而沴不作也漢唐以降不務修德任氣縱情舉動乖舛無以感人及物其上下乖盩睽隔氣已不貫而又禮樂不興刑政苛紊賦役煩重民不聊生自五榖八材珠象玉石木金革羽以至女工麻絺絲枲竭其原隰室廬之所出山海江河巖穴之所藏終嵗勤動而不足以養生送死斧斤相尋戕及枿肄罟羅搜抉遍至胎鮞加以蠻夷盜賊攘竊吞噬無復相生相養休息之道由是隂陽元氣壞爛雜亂而無統欲其災沴妖孽銷弭不可得也噫然則欲求王政者盍亦反諸本與儒行篇文瀚而意激旨襮而語誇豈惟不善學孔子亦非能言德行者也禮運先儒以為出於子遊門人所記與夫子答問之時既逺記憶傳寫支末益分固不能無增竄之雜其言大道之行也天下為公是為大同天下為家是為小康所謂講信修睦亦非帝者氣象彼徒以二帝三王官天下家天下如蓋寬饒所論又有揖遜放伐之迹帝王治效不同而不量非聖人之所得已也惟其時之使然也春秋以下處士議大率類此然其間多有禮之大端要語至理斯存有非諸子誕漫之辭所及存羊愛禮蓋不能無感焉考商以前天子皆七廟所謂七世之廟可以觀德是也太祖位西東向北為昭南向南為穆北向其前祖禰至高曽祖考為四親廟逺廟昭穆謂之昭祧穆祧其遷者藏焉韓文公禘祫議以毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而饗焉自魏晉已降始有毁瘞之議事無經據不可施行禮祭法一壇一墠二祧享嘗乃止去祧為壇去壇為墠去墠為鬼禱則祭之無禱乃止雖於仁孝流通之意若有未安然其漸而之逺則禮之所不能及而主遷於墓所蓋墓而鬼饗之者也張子以為殷而上無不遷之太祖至周始有百世不毁之祖三昭三穆四為親廟二為文武二世室并始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂之太祖若祫則請於君并高祖而祫之蓋不當祫而特祫如後世合食是也朱子禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫降殺以兩而祭法又有適士二官師一廟之文大抵士無二祖而皆及其祖考也其制皆在中門之左外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南天子太祖與一昭一穆為宗皆百世不遷二昭二穆為四親廟高祖以上親盡則遞遷昭常為昭穆常為穆諸侯無二宗大夫又無二廟其遷毁之次則與天子同毁廟之主藏於太祖廟儀禮所謂以其班祔檀弓所謂附于祖父者也文王在右武王在左以昭穆次序一定不易别有門垣各全其尊不以左右為尊卑也又穆王時文王當祧而有功當宗故别立一廟於西北為文世室至共王時武王當祧故别立一廟於東北為武世室劉歆則以自武王克商即增二廟至懿王始立文世室於三穆之上孝王時立武世室於三昭之上又韓文公以殷祖玄王周祖后稷太祖之上皆自為帝代數已逺不復祭之故太祖得正東向之位子孫從昭穆之列傳曰子雖齊聖不先父食常禘祫之時獻祖始祖冝居東向之位景皇帝太祖宜從昭穆之列祖以孫尊孫以祖屈又常祭甚衆四時之享惟藝祖不與而獻祖太祖以下各祭於其室合祭甚寡祫禘則惟獻祖居東向之位而懿祖太祖以下皆序昭穆南北相向是太祖所屈之祭至少所伸之祭至多程子以為不可漫觀以其議論精到合於禮也觀韓子謂太祖正東向之位朱子謂至唐太祖在北及群臣家廟悉如今制皆以西為上則知至宋廟制亦猶行夫古之制也諸侯則太祖居北而南向昭廟二在東南穆廟二在西南後世廟制行於朝廷王國而公卿以下皆無定法宋仁宗詔聽太子少傅以上立家廟而有司不為立制於是各為影堂又改為祠堂伊川謂無貴賤皆祭高祖以下後人宗之但云廟向南坐皆東朱子以為非是蓋古人户在東牖在西故坐於一邉乃奧處也司馬溫公曰神道尚右以西為上廟主自西而列朱子以為亦不是古禮蓋因天子太廟正西位而宗之晦翁居母喪家禮既成為一童竊而逃去至沒後其書始出其制以祠堂立於正寢之東近北一架為四龕每龕內置一卓龕外垂小簾簾外設香卓於堂中置香爐香盒於上大宗及繼高祖之小宗則高祖房在西曽祖次之祖及父又次之繼曽祖之小宗則不敢祭高祖而虛其西龕一繼祖之小宗則不敢祭曽祖而虛其西龕二繼禰之小宗則不敢祭祖而虛其西龕三祭排祖先俱以客位西邉為上自高祖以次而東皆正排旁親無後者各以四代之班祔食皆西向非嫡長子不敢祭其父如與嫡同居死而後其子立祠堂於私室專取儀禮為經酌古今之宜而兼取司馬氏程氏高氏之説祔遷則取橫渠節祠則取韓魏公所行為法其門人楊氏復蓋惜其書不經朱子再修而雜取諸家發明之義以足之故其禮參差猶未歸一愚見前御史聶氏文蔚亦嘗考究及朱子禮之節要皆本諸舊參以時宜及國初行唐縣尹胡氏秉中言許庶人祭三代祠堂以曾祖居中而左祖右禰至四世圖內亦以高祖居中左曾祖居中右祖左禰右而祭位則高祖居中曾祖居東上祖居西次下考妣東下降等而祔位亦列於東西夫古人制禮必有意義非茍焉者天子宗廟皆坐西東向以北南為昭穆昌黎祫議亦以始祖居中而太祖從昭穆之列況庶人之祭乃至祖孫排位並列揆之於義似有未安惟祠堂四龕既無古人外都宫內寢廟之制只得就其簡便易於斂藏而又隔之以板俾得各自為尊不相嫌瀆與龕中列主俱宜如家禮從西以次而左庶不失古人一派流通與繼曾祖以下小宗虛龕不敢僣祭之義至橫渠論長子微賤不立其間一子仕宦更須士人承祭辟之河身轉隨徑流之説實禮之權若恐廢祭從宜固難執一若時祭用仲及前旬卜日宜用溫公云分至日預於前月詣祠堂告期及祭排位次序則從時制亦不失古人昭穆之意也立春程子以為生物之始故祭先祖則以祖考妣為主而以高曽考妣共祭之季秋成物之始故專祭禰而諸祖皆不及其他立祭田忌祭墓祭冠婚生子及焚黃告廟改題與俗節獻其時食之類洎祝文宜一依家禮云讀書劄記卷八
