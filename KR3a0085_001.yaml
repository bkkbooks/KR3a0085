body:
  text: 讀書劄記卷一明徐問撰程子曰乾天也天專言之則道也分而言之以形體謂之天以主宰謂之帝以功用則謂之鬼神以妙用則謂之神以性情則謂之乾愚謂維天之命於穆不已性也乾道變化各正性命情也故受形天地者謂之人身係綱常有天下國家之責謂之主其精氣魂魄得於隂陽者亦為鬼神心統性情涵動靜妙運不測處故亦謂之神此人之道可以參天地也周子論太極隂陽分動靜至謂動極復靜靜極復動愚觀十一月冬至子半是初動而生陽至於壯夬遇姤一隂生而歸剝是動極而靜也自十月純隂隨至於復其動之端倪易謂見天地之心是靜極復動也動靜互為其根中間隂陽變合而生五氣五行播於四時散為萬物其跡可見易謂原始要終故知死生之說蓋三才之理始終不過太極生隂陽剛柔為動靜闔闢隨理卷舒生生死死以終始萬物聖人窮理盡性至命故知其說所以能作易與天地參矣天體渾淪輕清積氣南高北傾側輪而左旋其旋有九上軟下堅道家謂之剛風其氣最緊以二十八宿定布為天之體日月五星為七曜皆運乎氣機行止各有躔度隨天左旋地北高南下相函乘之者氣也故冬陽氣在下而水溫夏隂氣在下而水寒春陽氣達而草木萌動秋隂氣肅而百卉殞落隂陽雜亂氣不收斂則有冬花胎殰陽伏不能出隂迫不能蒸則有地震陽火煎熬隂脉枯絶則有川竭山崩蓋地以剛柔之質隨隂陽闔闢而用其形耳易曰牝馬地類行地無疆以其隨天引御貞合則和睽雜則漓而生異矣隂陽二氣程子朱子皆云如兩扇磨其齒不齊磨來磨去物之出者參差萬變巧歷不能窮也易曰剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女是也朱子曰天之外無窮而其中央空缺處有限又曰天外無水地下是水載又曰康節言天依形地附氣天理無外以其形有涯而氣無涯也其氣極緊故能扛得地住不然則墜矣氣外更須有軀殼甚厚所以固此氣也愚謂天之中極南北以日道有度分而知其數八極之外水氣交蓄便不可窮然以天運在內之常度約之於外似亦不可委諸恍惚汗漫而不可知矣前輩李文達以天一日轉運一遭豈有無邊際既有限不知限外又是何物雖再有千萬個天也無了期誠不可知而可疑也愚謂天能化生人物各全具一太極人之形體上顱下趾四肢之外更無餘物天地人之一大軀殼也故周流通徹只是一箇理氣數氣盡則數盡數盡則理亦盡而無餘矣故觀諸夷圖海外之國其人形體各異唐太宗收骨利幹其地夜易曉至熟一羊胛而天明蓋天地氣脉到此已盡不能蔽日矣若以為别有物則是天地之外又别有天地無始終無晝夜剝復日月無升沉無一元之㑹至於十二萬九千六百年恍惚虛無亦將何所底極哉善乎邵子曰天依形地附氣天地何所依附曰自相依附斯言盡之矣考書璿璣注及諸儒論天體至圓而動似鳥卵包乎地外地體至方而靜如卵之裹黃處乎天之中故曰渾天儀言其形體渾渾然也其制起於漢耿夀昌鑄銅為象宋錢樂始鑄銅為儀趙宋為儀三重曰六合曰三辰曰四遊蓋以天半覆地上半在地下而左旋不息北極出地三十六度常見不隱南極入地三十六度常隱不見南北極為天之樞紐子午相對只此處不動如磨臍然乃天地中至極之處也嵩高正當天之中極南五十五度當嵩高之上天居地上見者一百八十二度半强地下亦然其渾天分野嵩高極南十二度為夏至之日道天在地上最高故日長又其南二十四度為春秋分之日道天在地上稍低故晝夜平又其南二十四度為冬至之日道天在地上最低故晝短南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也自天皇氏始制天有十干為幹為母地有十二支為枝為子以定嵗之所在黃帝命大撓探五行占斗綱始定支干相配為甲子如言閼逢干攝提支為甲寅嵗又以十干為嵗陽十二支為嵗隂蓋天數中於五地數中於六天有隂陽故二其五而為十地有剛柔故二其六而為十二十干者五行有隂陽也十二支者六氣有剛柔也堯厯象以日月所㑹為辰其所㑹二十八宿經星之次舍取其中星初昏為候而考之以正四時如東方七宿自角至箕是為蒼龍以次舍而言則房心為大火之中南方七宿自井至軫是為鶉鳥以形而言則有朱鳥之象虛者北方七宿之中星也昴者西方七宿之中星也其四方之星隨時轉動復以斗柄所建指之處而定十二月焉至於考日景之長短漢天文志曰日有中道黃道也北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井近極故晷短立八尺之表而景長尺五寸八分冬至至於牽牛逺極故晷長立表而景長三尺一寸四分春秋分日至婁角去極中立表景長七尺三寸六分晷景所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為溫暑隂用事則日退而南晝退而短隂勝故為寒凉也故日進而為暑退而為寒若日之南北失節晷過而常寒退而短為常燠此寒燠之表也橫渠以天左旋日月亦左旋凡圜轉之物動必有機機動非自外也七曜恆星所以為晝夜者直以地氣乘機左旋於中故使回北為南日月因天隱見順天少遲則反右矣朱子以其言為至精小雅十月之交注以日行遲月行速皆右行於天乃舊說非也蓋天行甚健從東方角起一日一夜於天之內繞地一周三百六十五度四分度之一又進過一度其外四遊以薄四表而升降於六合之外日月亦從角起日行健次於天亦左旋一日夜周天三百六十五度四分度之一起度端終度端無贏縮郤比天退一度趕天不及積至三百六十五日四分日之一則天進度周得本數而日亦恰退盡本數遂與天㑹而成一年月亦左旋一日夜行不盡前數比天退了十三度十九分度之七至二十七日半强而一周天與初躔合又行二日有竒為二十九日半强與日㑹一嵗十二㑹得全日三百四十八日三百六十日者一嵗之常數也而三百四十八日不盡周天十二月內二十四節氣故置閏蓋日與天㑹而天多五日為氣盈月與日㑹而月少五日為朔虛合盈虛而生閏焉故一嵗閏則餘十日有竒三嵗閏則餘三十二日有竒五嵗再閏則餘五十四日有竒十有九嵗七閏則氣朔分齊是為一章也故日月進數為順天而左退數為逆天而右厯家以進數難算只以退數算之故謂右行者錯也又如天大輪在外一小輪載日月在內雖都左轉只有急慢便覺日月在右矣又按漢張衡周王朴隋張胃元及朱子諸說以日行黃道月有九行黑道二出黃道北赤道二出南白道二出西青道二出東皆斜入黃道內并黃道而九可見日行一道而速月行八道而遲也月道雖不同然皆隨黃道而出其旁黃赤道當天中南北合縫處黃道半在赤道內半在赤道外月道交結黃道外十三日有竒入經黃道而與日㑹謂之交朔望去交前各十五度其交朔時於東西十字路頭相遇若月或在黃道之南少有盈縮從邊而過或雖近而日在內月在外如人秉燭在內而執扇交過不相掩故皆不蝕惟月行內道在黃道之北去十五度以下月在內日在外日躔月道被月在內遮掩故為月之隂魄所掩而蝕至望時日與月正相向如一在子一在午火日外影其中實暗而微謂之暗虛月為日暗虛所射故亦蝕也詩注謂王者修德行政用賢去奸使陽盛隂衰當食不食郤是道理月盈虧之法厯家以為月朔去日逺魄死明生望去日漸近故魄生明死朱子曰此說誤矣書武成曰旁死魄為朔二日康誥曰哉生魄為望十六日恐厯家因是而襲傳之耳沈括言月本無光猶一銀九日曜之乃光耳光初生日在其旁故光側而見才如鈎日漸逺則斜照而光滿隋書云月日光照之則見日光不照則曰魄故望日日月相望人居其間盡覩其明故形圓初鈎與虧為二弦之日日照其側人觀其旁半明半魄晦朔之日日照其表人在其裏故不見其說頗近似之但月既為隂精所聚自然有魄其為日所照射而光生亦當有漸至望則全照而光滿矣易曰天地盈虛與時消息蓋有一定之理數焉恐不可專以形跡相望為據書稱生死蓋以日之照見與否而言非真能生死也至於月中影子即是所聚本然之魄光滿而魄見焉恐非先儒所謂山河之影也若以為山河影子日為陽光其照尤遍能無影乎明者宜更詳之禮運曰播五行於四時蓋四時氣也五行象也四時各分九十一日有竒為一時之正而五行則以木配春火配夏金配秋水配冬而土則分旺四時每季十八日有竒李氏希濂曰水火者隂陽變合之初氣至精且盛者也故為五行之先水隂而根於陽火陽而根於隂故水又為火之先也有水火而木金生焉木華而踈金實而固故木金次於水火而木又為金之先也土則四者所以成終而成始也然辰未戌丑土旺之月辰未為陽戌丑為隂陽則生隂則成春木氣盛則土為之傷夏火氣盛則土為之息故季夏本土旺而又加以火為尤旺故能生金而為秋也按五行家金生於已蓋辰之所生也但孕育方微至季夏方成體而壯耳此言五行相生之次也張子曰木曰曲直能既曲而反申也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不得而制焉木金土之華實也木水漬則生火然而不離也蓋得土之浮華於水火之交也金得火之精於土之燥得水之清於水之濡水火相待而不相害鑠之反流而不耗蓋得土之精實於水火之際也土者物所以成始而成終也此言五行之相為用也朱子以為張子說得最好雲峰胡氏曰春屬木夏屬火至秋火克金者也火金之交有坤土焉則火又生土土生金克者又順以相生秋金冬水至春水生木者也水木之交有艮土焉木克土土克水生者又逆以相克生生克克變化無窮此言五行生克之道也蔡氏以黃鍾為聲氣之元制律管長九寸空圍九分積九九八百一十分蓋九者陽之成也九為老陽取其變而生隂也其管一籥容秬黍中者千二百實九籥容黍萬有八百實以統陽律六隂吕六應十二日月所㑹之辰自十一月黃鍾之子以歷十二月大吕丑正月太蔟寅二月夾鍾卯三月姑洗辰四月仲吕巳五月㽔賔午六月林鍾未七月夷則申八月南吕酉九月無射戌十月應鍾亥所以通隂陽消長十二辰之氣也其陽律三分損一隔八從下生隂吕三分益一隔八從上生陽以率乎隂隂以從乎陽陽大隂小損益盛衰之理也自黃鍾為初九下生林鍾為初六林鍾上生太蔟之九二太蔟下生南吕之六二南吕上生姑洗之九三姑洗下生應鍾之六三應鍾上生㽔賔之九四㽔賔下生大吕之六四大吕上生夷則之九五夷則下生夾鍾之六五夾鍾上生無射之上九無射下生仲吕之上六隂陽六體易卦六爻之位也五聲皆從黃鍾起故為第一宫宫為中央以暢四方下生林鍾為徴為南方夏火為事上生太蔟為商為西方秋金物盛當傷下生南吕為羽為北方冬水為物舒毛翼上生姑洗為東方春木為民為蒼龍之角蓋黃鍾聲濁而長故漸以清短五音節之俾清濁高下遞應而和迭相為經也其宫與商角相去各一律則音節和惟徴羽去宫二律則音節逺故於角徵之間近徴收一聲比徴稍下故謂之變徴羽宫之間近宫收一聲少高於宫故謂之變宫變者二故置一而兩三之得九以九歸之以從五聲古人謂之和繆所以濟五聲之不及也考周禮圜鍾侈約之制容六斛四斗斛即量以銅為之內方外圓深廣各一尺左耳為升右耳為合下足為斗起於黃鍾之籥十籥為合十合為升十升為斗十斗為斛也鍾之廣長凖度度以銅為之長一丈廣二尺高三尺始於黃鍾秬黍之廣度之如十分黃鍾之一為一分十分為寸十寸為尺十尺為度十度為引也權衡亦起於黃鍾一籥之黍重十二銖二十四銖為兩十六兩為斤積三百八十四銖至三十斤為鈞當月之數萬有一千五百二十銖當萬物之數四鈞為石重百二十斤以象十有二月之數則量度權衡皆起於黃鍾以為則也國語景王將鑄無射而為之大單穆公諫之周禮典同掌六律六吕之和以辨天地四方隂陽之聲以為樂器是十二鍾及凡樂皆凖律也故伶州鳩曰琴瑟尚宫鍾尚羽石尚角匏竹大不逾宫細不逾羽革木一聲是八音皆依乎五聲而五聲又凖乎律也又太師教六詩曰風賦比興雅頌以六德為之本虞書詩言志歌永言聲依永律和聲則詩歌其聲長短亦必合六律五音也夫古帝王建中和立皇極厚典庸禮聲律身度以為禮樂之本而其制律作樂又足以通天地隂陽五行四時十二辰八方之風節宣其氣俾無滯隂亦無散陽奏之郊廟朝廷以禮天神地祗百神王出入奏王夏聽之以平其心中和以平其氣仁義以平其政達於天下以和其俗宜其位天地而育萬物也張子論雨雲雷風皆本隂陽二氣其理然耳然未及乎地之剛柔與五行變化若無所繫屬邵子觀物內篇以水為雨火為風土為露石為雷雨風露雷變而地化盡之矣要之隂陽成象剛柔成質五行變化運用隨之易曰山澤通氣雷風相薄則知雨雲風雷皆出乎地八卦方位蓋分繫五行剛柔之質而動於隂陽二氣之變所以盡天地之用也至於時暘時雨而雷出不震者又係君德中和之極所感召耳中庸言鬼神之為德易所謂鬼神之情狀是也乾坤闔闢所以為晝夜昏明為寒暑進退為日月盈虛為風霆流止為萬物生長收藏榮枯動蟄者是也在人則為血氣為魂魄為語默為作息為寤寐呼吸死生者是也本之隂陽氣機變合而生五行消息屈伸其間體萬物無乎不在顯諸仁藏諸用故張子以為良能然皆原於太極之有動靜而生隂陽以成化育道涵乎器器形於道真實無妄自然而然故言誠之不可掩也延陵季子葬其子於嬴博之間號曰骨肉歸復於土命也若魂氣則無不之也與易精氣為物遊魂為變意同故孔子以為合禮子孫為祖宗遺魄若祭以誠意求之則氣有可合之理故以蕭合羶薌爇之使臭達墻屋所以求神於陽以鬱鬯酒灌地所以求神於隂亦此意也讀書劄記卷一
