body:
  text: 讀書劄記卷七明徐問撰禮經解言六經之教石梁王氏以為孔子時春秋筆削未出又曰加我數年卒以學易性與天道不可得而聞以此知决非孔子之言其論甚是縱使言及易與春秋亦不必槩及他經而悉數其學之得失文辭煩促如此也然其潔靜精微等語亦得易之本㫖宜不可廢伊川先生以易傳示門人曰只說得七分後人更須自體究蓋造化道理無窮須如此說大抵伊川易傳說盡物理易之本也晦翁本義則兼卜筮言之易之用也要之非卜筮無以觀玩而知占非物理無以致用而成務二先生之言實相表裡學者宜並觀之伊川曰看易要知時凡六爻人人有用聖賢衆人學者君臣無所不通此正謂易者易也隨時變易以從道也又曰作易自天地幽明至於昆蟲草木微物無不合大抵理無大小其本一也邵子皇極以易大義在意言象數左傳所謂物生而後有象象而後有滋人物之象滋多滋而後有數亦此意也易坤先迷後得主利西南得朋東北喪朋安貞吉蓋西南隂方柔得從以類行然獨隂不能成也東北陽方柔失類而從之然後可以利萬物故曰乃有慶也然以正合如震一索得男而坤以安正待求乃為得吉若姤之取女則非安貞矣觀彖先迷失道後順得常一節正意若與本義不同惟程傳與彖義合當以傳為定遁小利貞本義以為小人利於守正不可以浸長之故而遂浸迫於陽遁義本為君子謀小人非能正者其浸長於下勢猶未甚君子尚可小貞其道以維持之大象不惡而嚴之謂也若否之不利君子貞正利貞之義質之程傳較順明夷以明見傷利於正固聖人雖為垂世明道而作然其實豈非文王羑里之時乎周公諸爻之辭曲盡其義豈非克商之事乎用拯馬壯赦西伯也得其大首商倒戈也獲明夷心崇侯譛也箕子明夷微指其實至上六而言益深切矣孔子彖傳亦以文王箕子為言厥有㫖哉渙九二陽居隂位宜有悔者然當渙二乃得中之位九來居二而得其中是陽奔就機慿以為安不窮於上也故亡悔程傳以初為機二為馬二與初雖非正應而當渙時皆無應與但以隂陽親比相求二急就于初以為安與本義不同然據彖之剛來而不窮則此爻之義從本義為是六三傳以為質隂柔才不中正雖有上九為應居無位之地豈能極時之渙止於其身可以出險而無悔耳不能及人者也愚以大凡有所樹功立事非陽剛之才德弗克如建侯之利於屯利涉大川於頥棟隆於大過朋來於蹇俱陽剛之爻本義以六三居得陽位志在濟時能散其私而無悔然散財恐非隂柔不中之人所可能也又當以程傳為定夬以五陽去一隂上六居窮極之時為國家菑害去之不可以不决九四以陽居隂而不中正欲止則衆陽並進於下而勢不安欲進則居柔失剛而志不决本義謂若不與衆陽競進而安出其後則悔亡以釋牽羊之㫖傳以羊者群行之物牽者挽拽之義言能自强而牽挽以從羣行可以亡其悔然既處柔必不能也雖使聞是言亦不能信用矣以戒不决之人為得去邪勿疑之義今當從之易簡之善配至德本義兼以為人事言之但此章本贊易之廣大天地四時日月對待交舉如云與天地合其德日新之謂盛德天地之大德曰生之類皆至德意與易易簡同參諸本文頗順吉凶貞勝蓋剛柔變通之間則為人事之吉凶惟貞固常久之理則可勝理勝則凶變為吉矣與下天地貞觀日月貞明天下之動貞夫一理皆以明貞勝所謂君子修之吉是也六位成章卦之六爻初剛二柔為地道三仁四義為人道五陽上隂為天道天地人之道既立迭相為用則天地人文燦然備矣本義發揮卦體卦德卦象卦爻隂陽之位吉凶之占而繫以人事之得失言約而義精矣稍可疑者存之以俟知者辨焉堯典欽明文思允恭克讓是欽明在內而允恭在外也文思只如文理密察之謂舜典濬哲文明溫恭允塞與贊堯義同通明為聖濬哲非聖之事乎言外溫恭則內欽明可知矣聖人純敬之德與傳心之要萬古如新要無有二義也近世學者忽於用敬之說可以自悟矣朱子曰古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既編年紀事至於事之大者則又採合而别記之愚謂五帝以前人主無甚失德故史臣大槩紀其一代事業與三王以下授受治水革命大事書而藏之如周之藏冊金縢是也至春秋時王者跡息諸侯橫恣孔子欲存天綱人紀乃具得失於各國各君之下以詔後世故不得不為書王及編年耳抑史官至周禮始備天官之屬太史御史以下多數十百人故列國諸侯皆有史官以掌記君臣政治得失如春秋傳晉董狐書趙盾齊太史氏書崔杼弒君至兄弟爭死以守其職可見按孔子孫騰見始皇滅先代典籍始壁藏尚書孝經論語於夫子舊堂壁中濟南伏生為秦博士亦壁藏尚書漢定天下伏生求尚書止得二十九篇孝文求能治尚書者伏生時年九十餘老不能行詔太常掌故鼂錯往受之伏生使女傳言齊人語多與頴川異錯略以意熟讀而已孔頴達以泰誓非伏生所傳武帝時始出故云二十九篇也又魯恭王好治宫室壞孔子舊壁其藏始出止得尚書至說命諸篇今書注稱古文為孔氏所藏其字古𨽻今文無𨽻蓋以漢書為今文也凡讀史先須看其道德而後及其功業如堯典首曰欽明文思克明峻德而後光被昭格以至睦族平章皆自內及外也其治則天時為始人事繼之故命羲和厯象授時以允釐百工熙庶績皆功用也舜典自濬哲文明溫恭允塞至於愼徽五典咨四嶽命九官惟亮天工以至眀目達聰皆事業也蓋其充積之久感通召驗治臻於變時雍四方風動就是中庸言至誠無息久徵悠逺博厚高明分明畫出唐虞體信達順篤恭而天下平之象及至禹謨世承極治水土平後專以民生食用為急故以德以政歸於養民而修水火金木土榖為六府惇教以正德器物以利用衣食以厚生為三事合而為九功使皆得理而不亂故曰惟敘而九功之德皆可歌也然其治則比唐虞固有間矣至於湯武革命順乎天而應乎人治定之初立中建極以王天下湯誓惟有慚德曰恐來世以台為口實泰誓牧誓武成尤為費辭商奄啓釁非有周公以聖匡救周鼎幾搖蓋遭其時之所難非二君得已也後世非無古建官立政綱紀規模只無本源流出如翦彩為花畫工繪像雖若可觀而終不如他天然精采血脉觀之諸史君臣言行治功可見武王泰誓數紂罪惡辭意諄復若非聖人之言恐孔壁所亡之文而漢雜之也武成篇孟子時已有血流漂杵之語實為古文蓋記事之過所不盡信者也至謂文王九年大統未集豫小子其承厥志則是武王伐紂為利天下實非奉天討罪以弔其民而文王之至德荒矣兹又可盡信乎箕子洪範以人君主天地民物而天時人事其理實相表裏故先言五行而即繼以君德五事其施莫先乎民故八政次之政以授時為要故五紀次之君道以正身為則故建極次之然用人行政須剛柔得中斯無折廢故三德次之事必通於幽明合於鬼神而後可行故稽疑次之其得失感通效驗各以類至故庶徴次之五福六極又指其徴驗之實若有勸懲於其間感應幾微如響斯答雖未必一一盡然要其理之所有不可誣也人君致治注措之詳莫切於此然皇極則曰斂福錫民無作好惡三德則曰臣無作福作威休咎徴則曰卿士惟月家用平康不寧又君臣民庶之所同也可不慎哉書周官先儒疑周禮六官無三公三孤意方條治事之官而未及師保之責今按周官立太師太傅太保謂之三公論道明曰官不備惟其人少師少傅少保曰三孤二公𢎞化而後及冢宰司徒宗伯司馬司寇司空明曰六卿分職是三公無定位而六卿有定職也惟冢宰如曰冢子曰統百官蓋為六官之長綱紀百司自當推重也又疑司空為周公未成之書今既曰司空掌邦土居四民時地利固當一時並建豈得先立此空名獨於官屬未置乃遽適當周公之沒哉恐無是也是知司空一冊亦經秦火亡失無疑漢儒補以考工記惟以工人造作為言殊非設官之意又謂法制有未施用恐或然耳朱子曰漢自古文尚書出方有周官篇伏生口授二十九篇無周官故漢制太尉司徒司空為三公而無周之三公三少本以師道輔佐天子只是加官周公以太師兼冢宰召公以太保兼冢宰是以加官而兼宰相之職也其說為得之愚又按漢初置左右丞相亦三公之任太尉為秦官當時所重漢興因而襲之又以司徒司空參用雜置已非其法惟唐六典亦得周六官之遺而知政事參議朝政參議政事參知政事參知機務同平章事並宰相之任已變公孤之制矣趙宋因用翰林承㫖陶榖謂唐有參知政事之說乃以直學士薛居正侍郎吕餘慶參知政事遂使一代官方變易名義疑舛元有中書令國初因之尋復釐革專重六部而省其屬之多員內閣如中書省多以卿銜而兼學士久則以公孤為加官乃得周制云按蘇氏以書顧命康王冕服事為非禮朱子但引太甲元祀以見康王當然亦不言蘇之非是愚以天子傳受天位上承宗廟百神之主兼以顧命而繫天下臣民之望中杜睥睨非常之隙所以代統向離以新庶聽君臣之分定於厥初數言非以為一身之圖而已故太保承介圭太史秉書俱由阼階隮御王冊命王三祭三咤上宗曰饗以告神也王出在應門之內曰王義嗣德答拜蓋以喪禮見成為後者以著代也既而羣公聽命趨出王反喪服於天子變禮未為失也胡氏春秋例人君嗣立逾年必改元臣民之心不可曠年無君改元以著新君即位之始故曰大居正若授冊受戒俱於喪次則何以承天受代正統定分以一衆庶之耳目哉况召畢諸公皆當時賢輔必能審酌先王禮義之中而察於社稷相傳之重决不以草率而廢禮也又周制期喪達乎大夫則諸侯亦在所略安得引庶人將冠子齊衰大功之喪而例之天子乎非謂天子之尊不行勢有不可耳惟三年之喪達乎天子此古今貴賤不易常經而漢文乃有以日易月之制後世踵而行之則可憾已按穆王吕刑之可取者折獄則曰兩造具備師聽五辭簡孚有衆惟貌有稽用法則曰上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重如大禹謨所謂宥過無大刑故無小周官所謂刑新國用輕典刑亂國用重典刑平國用中典是也至於贖刑則本虞書金作贖刑之說不諒其係於鞭朴之下情輕而為之若墨劓剕宫大辟有疑自當末减豈有罰自百鍰六兩曰鍰以至千鍰是使殺人大憝皆可不死貨利充盈而人命如草菅音奸矣况疑之一字又足以啓汚吏高下出入之門作法於貪而欲救末流之弊其將能乎此周室所以遂不競也漢毛享作毛詩訓詁以授毛萇故史記謂之大小毛詩然多隨文訓解或斷章取義不能考究時代推明大意以得詩人之心得朱子解而始著孔子嘗謂伯魚學詩其教門人亦以興詩為始蓋不知興詩意思終不和暢古詩溫淡和平莊重典則雖感時托物不失性情善惡可感可創諷咏之久自有以潜消湮鬱渣滓歸於動蕩性情和平之真暢於道德之意程子云興於詩是興起人善意汪洋浩大可謂善得詩人之㫖味者朱子云先儒所謂刪後無詩非謂不復作也但謂夫子不取耳康節云自從刪後更無詩亦此意蘇氏云陳靈以後未嘗無詩之說似可取失之大快無先儒敦厚氣象不奈咀嚼愚謂周盛時采録及制作皆列之樂官或用於郊廟朝廷或用於房中閭巷邦國以達天下所以風化天下者也王跡熄則化不行而詩響絶矣春秋傳燕享間歌多古詩知後雖有作蓋亦不復采矣又曰孟子謂詩亡然後春秋作先儒謂東遷後黍離降為國風而雅亡矣要識此詩便知周南召南當在豐鎬之時其詩為二南後來在洛邑之時其詩為黍離只是自二南進而為二雅自二雅退而為王風是也夫子刪詩以二南正家化國之始故列之於首程子謂二南猶易之乾坤龜山以為一體而成是也與邶鄘衛十三國並存以寓感發監戒之意抑諸侯采之以貢于天子天子受之以列于樂官於以考其俗尚美惡而知政治為得之左傳吳季子札聘魯見叔孫穆子請觀周樂十五國風咸有譏評二南曰始基之矣猶未也然勤而不怨邶鄘衛曰憂而不困王曰思而不懼豳曰樂而不淫齊秦稱其大魏唐稱其逺鄭陳知其亡自鄶以下無譏焉愚按朱子以二南為正風十三國為變風季子猶未慊於二南之化至於邶鄘衛齊秦以下有處變怨思之懷有惰曼淫靡之習有超軼悍强之氣有鄙嗇急蹙之情若此者顧猶亟稱之何哉蓋以文王之化止於江漢南國其幽冀濟兖青梁之間皆為紂地猶未洽也下比列國季世雖多失德而姜姬內媛變而知常情以止義其臣尚思西周宗社播遷其民猶知興復桑田大夫感懷離黍則以先王教化禮義之澤宛然如存齊秦本無可稱而推表太公原其功也曰周之舊原其地也魏唐儉嗇憂思原其遺也豳風雖在君臣疑懼之時而俗本先公辭出聖理其美信矣鄭陳靡曼蕩蔑禮法國步斯蹙理固宜然情之邪正道之汙隆俗之美惡皆于是乎見之可以興矣至於二雅小大本出於朝廷賢臣碩輔禮樂之懿冠冕之詞而燕饗㑹朝或通於下或專於上時代升降正變因之孔子刪而兼取焉可以觀治也然小雅則曰周德之衰豈以其制作皆出於代商之後大雅則美文王之德豈因其詩多追述文王者乎孔子嘗謂武未盡善而稱文為至德季子或得諸此矣三頌歌辭特稱曰至自直而不倨至於五聲和八風平以為盛德之所同也今觀商周之頌辭莊義邃音律和平魯祀后帝已非其禮而誇艷太過古風寖微意者歸重商周兹可略已伊川先生序春秋傳以為抑揚豫奪乃制事之權衡揆道之模範蓋三代盛時天經人紀既明夷夏大防復正班爵等威皆有定制而不可易其有陵犯僣叛則王者誅討之而已春秋之時諸侯雖知有周而王政不綱貿亂滋甚其間得失小大又自有不相掩者故春秋因魯史之舊各微辭以書之其抑揚豫奪微闡寓於一字之間如持權衡以定輕重而所存以不墜者實天地之常經百王之大法故曰揆道之模範也伊川云詩書載道之文春秋聖人之用詩書如藥方春秋如用藥治病蓋藥方是人無病時但知有此可治病用藥蓋因人病危急而治之所以保全命脉也此喻極切又曰五經之有春秋猶法律之有斷例也春秋傳為案經為斷又答黃聲曰以傳考經之事迹以經别傳之真僞延平云春秋且將諸家熟看以胡文定解為凖玩味當必自有㑹心處又曰春秋一事各自發明一例如觀山水徙步而形勢不同不可拘以一法然所以難言者蓋以常人之心推測聖人未到聖人灑然處豈能無失邪讀書劄記卷七
