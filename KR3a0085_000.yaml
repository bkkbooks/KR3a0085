body:
  text: 讀書劄記儒家類提要臣等謹案讀書劄記八卷明徐問撰問字用中號養齋武進人𢎞治壬戌進士官至南京户部尚書諡莊裕是書為問巡撫貴州時與從學諸人問答随時劄記而成所論天文厯象山川性理六經四子書皆守先儒成説其論學則一本程朱而力黜王守仁之學如古本大學親民格物知行合一各説皆逐條辨正問嘗與羅欽順書云王氏之學本諸象山至今眩惑人聴讀書劄記第二冊前實闢其説盖以廣中侍讀黄才伯促而成之才伯者黄佐字也所云第二冊者即指此本第五卷中語今核其所闢各條大都托之或謂又稱為近學世學而並未斥言盖是時王學方盛行故問不欲顯加排擯然所摘發多能切中癥結迥異乎叫囂強辨之流在明人語録中猶篤實而不支蔓者也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀讀書劄記原序書説命惟斆學半故學記曰學然後知不足敎然後知困知不足然後能自反也知困然後能自彊也二者無窮達無老少無人已内外惟理所在以求無不足與困之患而後在人者有以裕於已在已者有以及於人焉余不敏且老於義理進修蓋嘗玩索而未能深得其味每驗諸動靜考諸前言若或㑹通啓悟洎諸生來質疑而考異者必叅訂其是書而存之蓋取横渠有開劄記之意管提學副使陳君則清與諸生段以金軰交請以喻各學生徒因併就正於有道若以其言為不可易則烏乎敢嘉靖甲午延陵徐問志
