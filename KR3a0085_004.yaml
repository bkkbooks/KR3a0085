body:
  text: 讀書劄記卷四明徐問撰延平云今之學者雖存養知有此理但旦晝之間一有懈焉遇事接物處不覺打發機械即離間而差矣惟存養熟理道明習氣漸爾銷鑠道理油然而生然後可進亦不易也愚謂此即莊子所謂嗜欲深者天機淺天機即道心也道心淺則人心易隨而動矣於此中間不可無主而有主不可不豫孔子答子張問行以言忠信行篤敬蓋忠敬本心上工夫而欲於言行上求之恐其僞為於外而不由夫心之實也如告顔子克己復禮為仁而其目乃在於視聽言動蓋心本無私恐為物欲牽引而蔽之也故須以志克制克如戰而勝人欲負而退聽所以全夫中之理也意亦略同程子引春秋傳謂人有怒於室而色於市看來怒不留自不遷若留得怒時根在就是病自㑹遷也所謂有所忿懥則不得其正此顔子克己性情工夫到處顔子不遷怒伯夷不念舊惡只是克己處無私心忘物我顔子不二過與易復卦不逺復無祗悔元吉同言近過即復不再而有悔故天理盡還而得大善之吉象曰不逺之復以修身也伊川云罪已責躬不可無然不當長留在心胸為悔延平與朱子亦嘗論此謂是積下一團私意蓋有過宜速改悔則憂虞漸有遷善之象也易風雷益取迅速之意留而不化非克己工夫謝上蔡與程子别一年工夫云只去得箇矜字蓋驕矜氣盈也氣盈則自滿而中無以入善切問近思工夫須此著力書說命曰有其善喪厥善矜其能喪厥功以所見不大所得不深而義理之功止也大禹不矜不伐顔子無伐善施勞蓋見大知進而不滿假耳學者要大段見得又務遜志時敏則客氣漸漸消融不矜可幾矣克己先儒云在性偏難處克如大學正心便先言忿懥恐懼等事誠意便先言親愛敖惰等事以心局於氣質交於物欲牽引固滯遮了天理故克偏最難要從此上省察其然力掃而蕩去之而後吾心所具之性為天理本然者可復矣若留而不化任其自用一種根苖隨處生發而為害人已皆無益也六經克字訓能不言勝私至孔子始言克己聖賢工夫亦恁地著力或問不矜伐固是盛德聖賢皆然禹稱洪水懷山襄陵豫乘四載啓呱呱而泣豫弗子弼成五服各迪有功夔稱作樂以詠祖考來格羣后德讓鳯凰來儀又曰於豫擊石拊石百獸率舞庶尹允諧孔子春秋書叔孫墮郈季孫仲孫墮費齊人來歸鄆歡龜隂田皆若嫌於自伐者何邪曰聖賢不矜其德也據有而敷陳之不以小廉虛讓遺其實者也古善則稱君過則稱已固是忠厚之道然一向以此做去恐流為後世虛讓納諛而公心亡矣唐虞君臣只是實德相孚吐露無隱後世仰其形容氣象如立春風中孔子春秋為萬世信史當時亦嘉鄰國有悔過改圖即與其善之意故書之非為己也明道謂義理與客氣常相勝只看消長分數多少為君子小人之别消盡為大賢又曰人知和緩臨事反至暴厲只是志不勝氣反動其心又曰今人不能袪思慮只是吝故無浩然之氣又曰治怒為難治懼亦難克己可以治怒明理可以治懼非實用工夫體認不能論及此上蔡云凡事必有根又必須有用處尋討要用處病根將來斬斷便沒事語粗而意精决與孟子謂萬鍾不辨禮義受之兩節義同學者知心上公私便知事上有義利張南軒許魯齊謂學莫先乎義利之辨比之程朱論學已是第二件工夫然於世態沉冥中要識此便能卓然自立朱子云李先生說人心中大段惡念易制伏最是那不大段計利害乍往乍來的念慮相續不斷難為驅除今看來是如此愚謂此即所謂將迎之病事已去而隨之未至而迎之憧憧往來者也此而不除根討不得虛靜心學用功處正在裏許周子謂誠心復其不善之動愚謂凡身之不端由心之不誠心所以不誠由所感淫邪非僻易觸而動內有不善之動外有不善之為如木本不直而欲影正水源不潔而望流清無是理也與大學正心誠意義同而復不善之動窒欲不行不行有還反之義於學者尤有力程子動針曰哲人知幾誠之於思志士勵行守之於為確哉言矣太甲曰顧諟天之明命注謂常目在之蓋虛靈之心而五常萬善森然畢具心與理合原無私僞之雜習染之汚何明如之此即天之所命於我而我所以為德者本如是也古人視不下於帶君視不離乎夾帶之間正持守此心不敢放耳目既在心使不走作即存養之事主敬之功顔子之服膺中庸之尊德性孟子之心勿忘皆是此一句於學者用功甚有力易震驚百里不喪匕鬯程子以處大震懼而不自失惟誠敬而已觀其遇風波日心存誠敬實能踐言洪範所稱平康正直沈潛剛克高明柔克本舜命夔典樂教胄子及皋陶九德中出來皆恐其過與不及就其偏而益損之使歸於中而已聖賢道理言語自無不同處孔子謂不怨天不尤人愚謂天理渺茫難究故不怨天易人事物我相形故不尤人難欲不尤人必先克己易咸程傳謂感以心蓋心無私係故虛虛中無我故感無不通如王道之皡皥也往來憧憧係其私感如霸者之民歡虞而已耳所感有限其能大通乎橫渠謂不知疑者只是不實作心不忘學雖接人事即是實行學未至而好語變必知終有患蓋學至疑處始知其實行不疑非行也道只在日用常行間若此心不忘而行能實雖涉人事即是道也事理有常則非聖人不可輕議權變若無禮義為之凖衡揣摩臆度覬其幸中則是不知而妄語以欺人為能耳三者人情所同患學者可時時經心也朱子答張南軒書曰以天理觀之動之不能無靜猶靜之不能無動也靜之不能無養猶動之不可不察也但見得一動一靜互為其根敬義夾持不容間斷則雖下靜字元非此物至靜之中蓋有動之端焉是所以見天地之心者先王以至日閉關安靜以養乎此耳固非逺事絶物閉目兀坐而偏於靜之謂但未接物時便有敬以主乎其中則事至物來善端昭著而所以察之者益精明耳伊川於已發之際觀之正謂未發則有存養而已發則有可觀也此語甚精確而猶不安於靜觀未發之論愚恐終不能遺於反觀也明道以必有事焉而勿正為直內之道是亦欲以集義上求之蓋心有裁制動無違理則理存而邪曲之私自不能容以干吾之直勿正是行所當為而不計功效計則為私意所動而反害於直矣若曰間邪存誠事同而功尤密學者宜並觀之氣為志使動循其矩志為氣使背眩逆起君子定其志養其氣愼其動故心體常安而氣體受命也孟子謂氣動志如蹶者趨者蓋顛越急趨在氣而欲速則亦由乎心又如人鬬很是氣然忿懥則發於心驅僕鬬很僕固為氣然其主翁為心若心操得乎中則氣自平主得其理則僕不亂故曰志動氣者十九言其時常多氣動志者十一言甚少也心具性先儒以為郛郭於人雖資環衛而終為二物惟榖種之譬為得之蓋其渾一之妙難以言語形容只得如此名狀欲人之易曉耳夫水本淡濟之五味而後和然其相投之分不可離也故孟子以為良心又曰良知良能正以其有性之德渾合得在張子謂孔子意必固我有一焉則與天地不相似蓋聖人之心廓然大公無有私意先存於中物來順應何有於必事過不留何有於滯物各付物而我之私略不有焉天地以心普萬物而無心故與天地相似朱子以肫肫其仁三句全體是未發的道理延平以為乃是體認到此達天德之妙處就喜怒哀樂未發處存養至見得此氣象儘有地位也大抵此言至聖之德惟至到故與仁為一惟至靜故與淵為一惟至極故與天為一與道理之說不同亦非體認所能到也但子思言天德至此郤是體認到處中庸誠者自成也一章學者多講解不同遂將道理氣脉支離殊不貼實蓋此專言人道注謂誠以心言言人實心全體此理而自成此懿物若泛指物理自然成就則於言人道無與自道不順若止云孝成人子忠成人臣類亦覺得偏枯而少合一就是孝子忠臣皆由此心實欲作而為之故能成孝子忠臣而忠孝之道亦人所當行也又如殺身成仁舍生取義只是此心實見得合如此做成就一箇是而已二節亦申言上意終始正如朱子所謂徹頭徹尾若囊中貯米上下充貫其中稍有不到不滿則此處虧缺而無物矣三節非自成已一句正照應首節自成意故注曰誠雖所以成已然既有以自成則自然及物而道亦行於彼矣此非朱注言之實子思立言之意也易乾道以忠信為進德修辭立誠為居業蓋德不進只為心不實充實有基故德可藉而進如曰忠信之人可以學禮也言不實故立事無據言謹則業可慿而居如曰言之必可行也內外皆實德業所由成矣修辭立誠只是謹飭言語使根於理而發無不實如曽子所謂出辭氣斯逺鄙倍意易知至可以幾知終可以存義蓋事理之幾微纎悉非知無以至之如大學之知至也事理之兼統條貫非行無以終之如大學之能得也孔門教人與大學之道皆先知而後行所謂先明諸心知所往然後力行以求至是也至子思中庸乃以天命之性言之其功則曰尊德性而道問學疑若有不同者蓋孔門學者夫人皆知求性故以知先之戰國時人心不知有性故揭以示之所謂其憂之也深故其言之也切信然論語博文約禮大學欲誠其意先致其知是知在行先也蓋人心虛靈於理無不該貫格物窮理則內外昭融根基已定心有定向而不外馳理可貫通而不妄應故其動皆以天而所感好要皆得其正矣後儒工夫乃在居敬然後窮理以致知郤似倒做了只緣後世人心流放必收之使還定然後窮理俾體用不偏要之居敬窮理二者須交致其力不可偏廢易大畜多識前言往行以畜其德語以道聽塗說為德之棄二者實相反蓋始以聞而畜之終為己有也不畜則所得不聚而渾融於我以為充實光輝如朱子云小人趁得百錢無箇屋子亦無歸宿語最切實以其將不為己有也若徒有操持而不考求嘉言善行以為吾益是屋子雖存而家具虧缺未免坐孤陋寡聞之患又安能泛應而不竭哉延平嘗曰學問之道不在多言但默坐澄心體認天理雖一毫私欲之發亦退聽矣久久用力於此庶幾漸明始有進耳此於靜觀喜怒哀樂未發前氣象求中意同蓋心為活物靜中有幾動處方可體認與存養用敬意差别亦是此老平日用工得力熟處故屢言也論語以博學篤志切問近思為仁在其中朱子以未及力行為仁猶若别有一樣為仁工夫要之學不博則無精義以入神志不篤則無忠信以進德切問如樊遲問崇德修慝辨惑之事而不泛及於支離近思則又鞭辟近裏著已而不馳騖於高逺則知行並進存省克治交致其力內則本心常存外則人欲退聽仁即此而在矣孟子以學問之道在求放心朱注謂學問非一端其要在求放心蓋指為學問中之一事而為切要者也然學以聚之多識以蓄其德問以辨之精察而析其幾正恐本心不存理欲混淆以此開明知往察識求至所以復其本然之心而已矣故學問之道只在求放心禮曰疑事無質質其事之無所徴驗者也語曰疑思問問其理之所未信者也此又事理心跡之不同先儒謂學顔子有凖的愚謂顔子天資明粹未可學惟學曽子有凖的孟子答公孫丑不動心之原歸之曽子大勇是孟子亦學曽子觀其日省𢎞毅之言與答孟敬子問疾之語皆反身蹈理極力擔當故其傳無弊也程子謂不學便老而衰易謂日昃之離大耋之嗟是也孔子不知老之將至者以此延平以為聖人渾是道理不見有身世之疑亦見得真朱子解時習曰重習易習坎上下皆坎陽陷隂中維心亨故重習所以求通蓋言難也明道謂學要鞭辟近裏著已蓋鞭策拊辟皆自外以約其內茍不向裏靣歸到己身上做工夫舉皆為人矣何以求仁大抵為學立志要逺大如曽子𢎞毅持志要定如中庸擇善固執工夫要次第如行逺自邇下學上逹力行要勇如終日乾乾不息於誠若徒有大志大言而工夫不繼便放倒行又或作或輟恐終於墮落無補耳程子言化物役物蓋為物所化所役不能化役物矣樂記曰物之感人無窮而人好惡無節則是物至而人化物也亦此意延平李氏曰學者之病在於未有灑然氷解凍釋處縱有力持不過茍免顯然尤悔而已學至氷解凍釋處方是實得朱子答林湜謂近世學者或不能有所至病在一觀其外粗覘倣佛便謂吾已見之驟語雖知可悅而無以深得其味遂至半途而廢耳此後世通患可時時深省延平云問學有未愜適處只求諸心若反身而誠清通和樂之象見即是自得愚謂此正晬靣盎背處孔子以先事後得為崇德以先難後獲為仁蓋欲學者求盡其性於難而不敢躐功於易所謂求在我者也董子正其誼不謀其利明其道不計其功亦得聖門遺㫖朱子自言初為學全無見成規模後來見李先生較說得有下落更縝密今觀延平答問朱子議論誠有未安處得延平開悟郤又見得徹晦翁先生曰人若著些利害便不免開口告人郤與不學之人何異李先生說大段排遣不去只思古人所遭患難有大不可堪者持以自比則亦可以少安矣伊川先生曰莫說道將第一等讓與别人且做第二等才如此便是自棄愚謂自古賢人多希聖亦只做得二等事若取法乎中斯為下矣有識見者知富貴貧賤常變分不可易既能審而為之利害當其前輒復紛其念慮變其所守是不能以志帥氣以義處命復同於小人之歸矣橫渠先生答范巽之曰所訪物怪神姦此非難語孟子所謂知性知天則物之當有當無莫不心諭若欲委之無窮付之不可知則學為疑撓智為物昏而溺於怪妄必矣此正聖人道其常意隂陽壞戾物變橫生皆事理之變故聖人不語也君子德存而性定其於顯晦榮辱不加焉於得失休戚不加焉有善不矜知過必改蓋虛中無我務進益者也反是得則驕泰以陵下失則忮忿以訕上善則表暴以自鳴過則文飾而掩覆理欲之關善惡之幾决矣可不謹哉君子未嘗無怨以公以直報之禮父之仇不戴天兄弟之仇不反兵交游之仇不共國其餘直報之而已矣言語之傷物我之形為私怨觀理忘怒斯已矣若以私忿傷公物欲翳明刻暴掩恕任厥橫施而一之不足以酬也夫於人已何益之有易遁六二執用黃牛之革言堅守於遁不能易也語曰篤信好學而終之以隱以見當遁者貴明理義决去就伯夷太公其人也顔閔南容為次之丈人長沮之隱亦未為失只是多譏孔子易晉六二晉如愁如難進者也故君子三揖而進以逺辱也有子以孝弟為仁之本仁為萬善之長善為百順之名而孝弟又實行中之順德也順故性中而粹德和而淳天理根基藹然發見推是心行之何不善之有若無孝弟則於父子天性已有物我睽隔持此凶德而往陵上殘下無有紀極充類而至不作亂不已也可不戒哉孔子以不為周南召南為靣牆蓋不務本原尋路頭而欲施之家國天下自是通透推行不將去伊川易家人傳云正倫理篤恩義家人之道也家人上九爻辭謂治家當有威嚴不先行於己則人怨而不服又曰世人多慎於擇壻而忽於擇婦其實壻易見婦難知所繫甚重豈可忽哉孔子以益者三友蓋取以講學輔仁與易大象麗澤兊相表裏此友之倫所繫甚重不可一日缺也明道曰朋友講習莫如相觀而善工夫多亦得此意張子曰戲言出於思也戲動出於謀也蓋朋友而戲非克終之道孔子稱晏平仲善與人交只是久而能敬故傳曰敬德之聚也程子以朋友忠告須以誠意孚於未言之前數則斯疏矣此非特處友亦得處己之道所謂忠與信正在裏許程子謂曾㸃漆雕開已見大意愚謂曽㸃見得道理中物各付物意其氣象大漆雕開郤是見得道理中有未信處知體用大故曰已見大意治經遺道伊川引韓子買櫝還珠遺了櫝中好物然猶知有經在後世治經求仕而遺經則所謂得魚忘筌者是已可慨夫橫渠謂多聞不足以盡天下之故蓋學貴識得大段道理不在多聞多聞亦喪志於吾身心實無所益若聖賢切要言行則不可不聞耳程子以為文為玩物喪志吕與叔以文似相如類俳優如將一物來玩弄心只在物上故喪志俳優又以猥䙝之戲欲人之喜其失更逺矣延平云聖賢言語但一綽看過便見道理者郤真意思才著意去看便蹉過了多大抵道理本平易不可過索深求也明道在倉中數椽事類此意朱子答嚴時亨論性以孟子答告子一段言學者看書中義須同中識其所異異中識其所同然後聖賢之言通貫反覆都不相礙各說道理則互相逃閃終身間隔無復㑹通之時矣朱子答孫季和云學校固不免為舉子文然亦須告以聖學門庭令弟子略知修己治人之實庶幾於中或有興起作將來種子朱子答蔡季通云思索義理到紛窒處須是一切掃去放教胸中空蕩蕩地了郤舉起一看便自覺得有下落處此得之李先生曽說來愚謂不特思索義理但存養應事亦須掃盡胸中雜念然後心體之虛明常存見得不差又答吕子約云論孟中庸大學乃學問根本尤當一時致思以求其指意之所在今乃泛然讀之非所以慎思明辨而究聖賢之淵源也愚謂論語為入門路數孟子作用處多大學本末備舉中庸要其歸極二書首挈綱領即知大義然其中間工夫次序義理精微非盡研窮融㑹不能浹洽也又答尤叔晦云橫渠先生言觀書有疑當濯去舊見以來新意此法最好伊川先生云學者要自得六經浩渺難盡曉且見得路徑後各自立得一箇門庭歸去求之可也注云得路徑則知趨向立門庭則有規模孔子答或人問禘與言既灌而往不足觀注言魯君臣懈惰意若無所考蓋郊禘非禮魯後世猶行之故方祭始灌地降神則所降之神皆非魯之所宜祀而其端已非禮矣大端既失雖以後之玉帛鐘鼓儀文升降亦將何觀至於問禘不知實為魯諱治天下如指掌則言周之禘禮之大者也治定制禮既立始祖之廟重其本原以為祭始又推始祖所自出之帝五年一禘而以始祖配之蓋以仁愛誠敬之心不忘其本泝流而源極於無窮其義極深逺又禘為次第有締合意與易萃卦王假有廟利見大人亨祖考渙而萃聚其精神之義同仁人孝子制作意義精微其理實侔造化以此格幽何幽不格以此動物何物不動運之以治天下真猶反掌耳朱子論東坡以舜禹避朱均慮其避足以致天下之逆至益避啓又謂其避之不度而無耻類以世俗不誠之心度聖賢則凡辭讓者皆欲隂取而陽為遜避不自知其為非也愚謂蘇子文人喜為高論欲搜抉前人未言之意而不諒聖賢至公無我之實程氏以帝王之學與儒士異尚儒生從事章句文義帝王務得其要措之事業然以大學明德首言之則天子至於庶人其學未嘗異也但為俗儒務於章句恐帝王亦效其尤而忽於推行故不同耳人所以不能自立者利與害驅之也所以計利害者富與貴汩之也夫農工商賈各食其力利其利若無求於人而士以禮義為學反汩沒於富貴而弗能自振孰知吾性分之貴有榮於文繡㫖於膏梁所欲所惡真有甚於生死哉噫味孟子之言可以惕然深省矣讀書劄記卷四
