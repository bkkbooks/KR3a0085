body:
  text: 劄記一書先生撫貴州時與學者問答辨究隨所記而成者也其間三才之道性命之奧事物之理六經四子之言與夫古今言語同異之辨得失之歸靡不詳且悉焉道理充溢脉絡分明是非明白功夫精審而要領卓如也學者一見便有下手處若夫人心動靜心性理氣知行存省克治主敬集義窮理等條皆於故得新以真證妄有以發前古之未言洗方來之臆說其有功於學者大矣至於叢六經而類解集羣言而折衷利道旁通㑹羣流於淵海真所謂萬法歸一者也夫尚著作者陋簡淡雄辨博者費辭藻竒新巧者厭成說而不知夫道大中至正焉而已矣髙不可亢卑不可貶非夫言語文字所得而損益之也昔季通作律書無一字不本於古人已試之成法而其獨得之妙則有當世所未知者蓋惟真有所得乃能如是先生忠信不欺體驗純熟充養有素而踐履篤實自動靜食息辭受取豫以至出處進退出言舉步無一不揆之道而後安其與諸生言皆造道育德咀嚼飽滿之餘語雖約而道該辨不煩而理勝簡易精深文理密察使人讀之有樂則生矣之妙欲求先生之學而學之者豈徒於行墨間而已哉舊本頗訛伏讀之餘隨為訂正因書其所欲言者於後以俟夫同志云爾嘉靖乙未春三月甲子門人莆陽林華䪺首拜書
