body:
  text: 讀書劄記卷五明徐問撰謝上蔡持體驗克治工夫甚力郤從禪學中出來以知覺為仁以樹根比念頭雖皆切實而不能無本來氣味朱子以程門高弟如謝上蔡遊定夫楊龜山下稍皆入禪學去故程子曰我死而不失其正者尹氏子也然尹和靖又似少窮理之學故充拓不大杲老欲張無垢用其禪學改頭換靣出來蓋欺人也而無垢竟用禪不改若劉元城貶南安章惇遣判官至欲殺之是夕鼾睡如故至死不畏若真禪矣然其徑節直氣則恁地光明象山從禪著腳郤從高處立論與人多拗故朱子謂其專主生知安行而學知以下一切皆廢則於聖門下學上達格致誠正工夫已漫不相關矣象山與朱子鵝湖議論多不合且指朱子為葛藤蔓説若以氣折人而不察夫理之本末精粗內外聖賢原是如此教人其等斷不可躐易非朱子杜撰之言只是朱子推明得詳盡如云大學首章析之有以極其精而不亂合之有以盡其大而無餘者也其答項平甫書云子靜專尊德性而某平日所論道問學為多當反身用力去短集長庶不墮於一邊耳觀朱子平生論説義理甚詳備誠如繭絲牛毛然歷歷皆有根據下落而子靜少平心易氣偏拗處多不知尊德性者何在而朱子則欲就其所謂德性會歸而同之也然則晚年自悔粗心浮氣蓋悟往日之差其進亦可知矣又曰子靜説克己復禮云不是克去己私别自有個克處又云只是有一念要做聖賢便不可曰聖門何嘗有這般説話看他意思只是禪志公云不起纎毫修學心無相光中常自在他只要如此愚觀自古大聖大賢如伊尹孔顔孟其相師相勉精察力行只是一個志若無志不知何所向往何所歸著宋大儒多於禪學中著腳既知不是便走出向實地大路上行若子靜恐未免沉冥其中耳近學以大學在親民宜從舊本不用新民愚謂講説道理在親切妥貼不必拘於一字且新民與明德相應蓋自明其德又當新民也且引諸書於民上皆無親字曰親其親曰親九族曰親親皆以所親而言曰百姓不親以民自相親而言若以民為親則是兼愛無親踈也明者必能辨此或比堯舜孔子湯武夷惠如金有輕重等鎰愚不知顔孟曽閔以下只有幾多鎰也要之聖人德無不盛所以孟子只言性之反之之異耳至若伯夷栁下惠其實不及顔子故孟子就其一節之粹而無雜者亦以聖稱之正不可拘泥在迹上或謂知行只是一個工夫不可分作兩段事與易知至至之大學知止而後有定孔子知之不如好之意相背又曰敬即無事時義義即有事時敬兩句合説一件與敬以直內義以方外意相背大扺聖賢説道理有本原有作用理無二致而用功則有先後故其次序如四時之不可易若欲打滚一處或倒做了工夫恐於道難入也或謂如稱某人知孝某人知弟必是其人曾行孝弟方可稱他知孝知弟如痛必自己痛了方知痛飢必自己飢了方知飢愚謂人能孝弟稱其孝弟可矣何必稱他知孝知弟知在我乎在人乎不然人已知行之間真世所傳蕉鹿之夢也又痛與飢知之無益痛必拊摩而使之平飢必飲食而使之飽終亦力行之在後也若費辭求異互相逃閃以求必行恐於平易處反戾又謂只説一個知己自有行在則是周公思兼三王仰思而得之已不須待旦矣痛與飢寒事郤似行到方知類象山解君子喻於義必要好後方喻與程子所謂惟其深喻是以篤好又云須知了方行得意相反若行逺不問道先知所向未免摘埴索塗冥行而已耳近嶺南黃才伯云知如目視行如足行既有先後又非徒知而不行者較能發先儒未言之意或謂人儘有知得父當孝兄當弟郤不能孝弟此已被私欲隔斷未有知而不行者知而不行只是未知此等語亦自痛快切中人病但云知行本體聖人教人正是要復那本體愚恐二字無本體只有知之真與不真行之力與不力者耳書曰知之非艱行之惟艱正此之謂也或謂貨色名利等心一切都消滅了只是心之本體自無間思慮此便是寂然不動未發之中便是廓然大公自然感而遂通發而中節如此只説得至誠能盡其性者也若常人之心易感而動其動也天理之道心常少物欲之人心常多貨色名利等心如何會自然消滅得盡便至寂然不動廓然大公發而皆中其節哉大舜惟精惟一是精察理欲之幾而決去人欲以循天理斷斷乎不可易者其次則莊敬以存養之而已或謂居敬即是窮理就窮理專一處説便謂之居敬就居敬精密處説便謂之窮理是以中庸尊德性道問學頭緒混為一處又謂戒懼慎獨只是一個工夫無事時固是獨知有事時亦是獨知省察是有事時存養存養是無事時省察若意念未萌善惡之幾未兆原無有知須安靜以存養之何用省察及其感而幾動則宜省察以決之何用存養人心動靜隨處可以用功若打混一處尤難得力也或以大學格物為正物如大人格君心非之格若曰自正其心則物字無下著落若去正人心與自己知至意無相關而上文正心意義又重疊推説不去或謂正心誠意致知格物云格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有內外彼此之分哉愚觀記曰人生而靜天之性也感於物而動性之欲也物之理雖具於心而實散於事心意中似不可著物著則不能虛靜而物其物矣至謂正其物之心誠其物之意致其物之知噫焉有舍己而於物上反用如許工夫哉或謂致知內兼行格物取物自正之義無工夫無先後愚謂此孔氏遺書其充積工夫先後次序最為切要而精確恐不可輕以他説易之其言修身行乃在其中矣其言格致蓋謂致極吾心知識全在窮物之理則能會通曲暢內外昭融而明德可明矣如此亦自明白奚必為竒異以疑人之見俾反覆漫昡而無所從入况先後字已見經文及古之欲明明德句下又疊有先後字工夫至格物而盡矣不然下文物格而後知至句豈徒言哉高明者自當有悟近學有謂人不須多讀書六經亦聖人之迹耳果然則顔子所稱博我以文易謂君子多識前言往行以畜其德何意邪且六經所載皆天地萬事萬物之理帝王君臣經綸裁輔之道與聖賢在下藴蓄憂違之情淑諸徒以傳諸後者在焉非講習以窮其理則無以致吾心之知而知所往吾恐其所獨見以為明者未免局於私智而於事物終扞格而難通必不能順應以方於義矣世學或謂心中不須用一箇敬字且病宋儒程朱主敬及主一之説不知敬非别物只是尊德性常以心為天君為嚴師翼若有臨而不敢怠放聖人純一無偽有自然之敬齋戒以神明其德所謂齋莊中正是也賢人嚴恭寅畏有固守之力操存涵養不敢放置所謂整齊嚴肅是也其用功則不妄動之謂誠弗岐二之謂一不偏倚之謂中止紛撓之謂靜無邪曲之謂直中有主之謂實去物欲之謂虛其實一也外則踐履執事使民常整思慮斯須不忘正衣冠尊瞻視非禮不動是也舍此則靈扃無主人心客氣交病於內耳目口鼻四肢富貴利達諸欲攻奪於外譬如所居藩籬不固中之所藏寇竊得與我共之我方在外奔走救急不暇雖有良知亦將為所昏塞而無所用其明矣考易詩書所稱曰敬直曰敬德曰聖敬曰敬止曰毋不敬曰修己以敬聖人以此洗心其言若出一口而謂盡非乎哉商書咸有一德云德無常師主善為師舜察邇言詩詢芻蕘孔子問禮問官是也善無常主協於克一又曰一哉王心舜之執中惟一孔子之一貫是也尹湯一德其傳尚矣程子以敬為主一一蓋天理渾具於良心不為物欲之雜可以統會萬殊而貞天下之動以歸於一而或謂主一之非至謂一心在好貨好色上亦可為主一不知要誠意之功何用無乃未之思乎或以平生篤志仙釋自謂既有所得者三十年後見得聖人之學若是其簡易始自歎悔夫聖人之學易感人而平時舊習未能猝去明道見周茂叔後十年遇獵喜心復動可見偏好非旦夕頓悟所能移也但才氣髙邁者未敢誣其盡無所見以悔平日之差只恐放言論道猶坐測度之見如明道語荆公觀塔而未入其內雖有聰明説出一段好處可喜而於渾實的確處未免走作若以其説遂行則不敢不辨前言往行善者甚多學者固當多識取益身心不可掩取遂為己出後世有著作者既或瑕議先儒一二又多竊其言以文其説如世有大學中庸管窺不知何謂也或謂後儒教人才涉精微便謂上達未當學且説下學是分下學上達為二也愚謂下學之事即上達之理學者固欲緣此一蹴而得之然其氣稟才力亦自有限不可凌高獵等反至汗漫而無所歸入程子曰蓋凡下學人事便是上達天理然習而不察則亦不能以上達矣如此言何嘗分而為二世之英才美器煞有高見者得人一言兩句起發而求之反自有得力處但不須泥於新説若只以論孟觀之自是平實有依據宋儒如朱子議論雖多然皆説盡學者之病與夫進為之方聖賢門庭路徑淺深曲折可尋而進但須博求而約守之耳簡便徑捷之説雖易聽可喜若無忠信積纍工夫下稍頭無著落恐終壞了士習非國家養育實才修明治化之意故不量其寡昧而辨言之非得已也宋之儒者議論明粹莫過於周程朱子詳其語意皆原於六經孔孟之訓或以閼塞而旁達其流或因支離而引通其會或隱約而宣之使明或斷續而仍之可久皆自本源而枝而派宏綱大旨要不詭於聖門而夷考其修身行己之實又能相符不徒為口耳孟浪無根之説惟在學者約取而力行之耳夫卑下者溺於近高曠者騖於逺簡易之理中庸之道自古為難若厭其説以為不足行而别為一説以新人之耳目則是六經孔曽思孟之書皆可盡議而異端之教固可修身治世而傳逺矣譬之巨室大匠繩墨已定自棟宇梁柱至於欂櫨侏儒皆不可缺茍欲去一件少一木雖有公輸巧為支持終不免棟撓之患其能久乎宋儒言語未敢説純是聖人口氣觀論語書孔子言語平約而理該更移不動顔子和易曽子誠篤至孟子剛毅中又有圭角三子幾於聖矣而尚隔一關後儒蓋賢人説聖人事也張子曰吾數年學恭而安不成雖氣象亦有難似之者況其言豈能渾然如出一口邪或言下學或言上達或言體用動靜或言性情工夫要其大義不詭於聖賢路徑斯已矣觀漢唐以後儒者談經做文字於道理多少病痛至宋始粲然復明吾人童而習之長執以用世若考論事理似亦無妨惟於所趨而或異之自非尚友之義惟吾高明同志者思焉理以條分為字義如君君臣臣父父子子之類是也義以制宜為字義如父子當親君臣當義之類是也然非其人則道不虛行易曰和順於道德而理於義孟子謂心之所同然者理也義也故禮義亷恥國之楨幹人之紀綱不可一日無斯須去焉者也子思以率性為道宋大儒始推明而行之而為忌者詆指曰偽曰黨至使空人之國而宋因以不競夫士修其禮義以存國脈使得逐而空之以利其富貴宋之國家世道不亦可悲乎夫道不明久矣不知實踐止以閉門兀坐為事高帽大袖為竒而竊虛名者固不足道若人能以禮義廉恥自勵必欲詆指而非笑之然則彼何人哉是可歎矣讀書劄記卷五
