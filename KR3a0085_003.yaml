body:
  text: 讀書劄記卷三明徐問撰易説一隂一陽之謂道與他處道字不同人物所由以生之理所謂立天之道是也其繼就是根頭發育處理猶全粹本無不善故繼之者善也然其隂陽變合中有五行隨這理出人物所由以生蓋禀具而為性也人於理只作個渾淪的物事㸔蓋中有根柢相切近處條理井然故謂之理在天則太極為根元亨利貞森然備具在人則心為根仁義禮智咸有頭緒如草木花葉凝氣於荄分類卷舒而出至於發生條暢其理莫不由之詳體可見程子答張思叔子在川上云道無窮怎生一篇無窮便道得他愚謂太極之理乗以隂陽五行之氣流行於今古兩間為山川為人物為寒暑晝夜其本由化機不停槖籥運動莫非道也蓋無形之理寓於有形之器川流亦道中之一器耳若人能黙識心通則眼前道理皆能見其活潑西銘自乾稱父至顛連無告者也見人與天地萬物為一體的道理自于時保之至匪懈言人所以事天的道理中引舜禹申生諸事以實之後言聖賢所以如此者蓋知天所以成就乎我而我當盡事天之意張横渠謂氣坱然太虛一段言元氣升降飛揚不息皆本隂陽有機所以發動有始故能成終風雨霜雪山川又指其迹之著者以見其微也程子謂天地萬物之理無獨必有對以其初動靜生隂陽故萬事萬物其形其理皆無出此二者故有對皆自然也先儒謂心統性情又謂心如榖種又謂心者性之郛郭大槩性為人所稟受於天之理而具於心心則種此理仁義禮智皆所栽之榖也然不可見皆於惻隠羞惡辭讓是非之情以發其苖裔則心非特為性之郛郭又為情之户牖氣則為其致役奔走而周旋者也人性稟受理氣原不相離氣質中則有清濁善惡耳故孔子不曰同而曰近然上帝賦畀此理於人以為性豈有不善者哉故孟子專言性善亦以戰國時人心陷溺而不知本然之善故指以示之如子思言天命之謂性是也孔子舉其全孟子究其本然君子不謂性命之説則又若兼氣質而引之於義理充之以四端為着力工夫求歸於善之意聖人同於人而超乎萬物皆自其性中充滿流溢而出自親親以及乎民物上下感通無不周遍初非有我之私所謂大同也只此就是踐形一箇様子若稍有間隔不通便與天地氣象不相似程子論易生之謂性人生而靜以上不容説蓋謂天命流行而生人物始有性人生而靜道理藴而未感故為天之性感於物而動為性之欲欲即喜怒哀樂之情也若以靜推而上之則為造化未形時只是一圑氣涵理在故不可言性言即墮形氣中非復性之本體矣孟子謂存心養性四字精宻二事雖開説而義實相因性本天賦仁義禮智信純粹真實的道理而寓於心有感則情動隨物而遷心有存焉者寡矣心既不存則人欲日長天理日消故存心所以養性養性所以奉若乎天之所以與我之理即子思子所謂尊徳性易所謂成性存存是也良心既存物不擾動大學之有定易之艮其背不獲其身時也定而虛虛而明一真自如中庸之謂中大學之謂靜易敬以直内時也由感而動出皆當理易動以天為無妄中庸之謂和時也由是仁之於父子義之於君臣五常百行及於仁民愛物而萬事各得其所孔子所謂一以貫之時也故存心養性工夫其效甚大性字訓義從心生以人心具此生理而實不外乎氣也程子以為性出於天才出於氣然才亦根於性之理必於氣以發之故高辛氏子八元之才忠肅㳟懿宣慈惠和盖以徳性用事是何等才也若專以氣用事則闇於理義為剛很給慧而非所謂禀受之才矣孟子所謂非天之降才爾殊與不能盡其才者也可見明道答横渠定性書大意動靜皆定不留將迎不繫内外此性所以恒定也次言無情者定之本順應者定之用既無情順應自不須除外誘除則增一套事易所謂至賾而不可惡也引易艮止為内定孟語不鑿為外定故兩忘無事靜而明通如聖人順應喜怒之常在於物而中無所係也後言忘怒觀理乃學者求定工夫而用力之要莫切於此人心有性猶良田之有美榖也榖得地氣而生長成實以利民生阜財用洽百禮其功用甚大而用力不能不資乎人故培土以厚苖根引水以資灌潤存養之事也時加省視以知其旱澇所侵稂莠螟蟊所害省察之事也隄防宣洩芟柞袪除俾無所傷以遂其長養之性而獲收成之功克治之事也人心生理稟於元為仁故曰榖種實則相類知此則知所以當存心而養其性矣或謂人心本無靜氣化流行亦無靜時愚觀易繫辭曰夫乾其靜也專其動也直是以大生焉又曰寂然不動感而遂通天下之故盖非靜無翕其動非動無闢其靜乾為至健而有動靜故曰人生而靜天之性也以為無靜非也人心存養不厚則徳不聚出皆支離未能順理易以尺蠖之屈龍蛇之蟄皆自外而内退藏於宻之事下言精義入神窮理入於微妙如中庸之盡精微乃為致用之本利用安身順而利往如易義以方外乃為崇徳之資此正是内外交相養之道蘇季明問喜怒哀樂未發前求中程子曰不可求即是思思即已發不可謂之中也又問吕學士言當求於喜怒哀樂未發之前何如曰不可既有知覺郤是動也怎生言靜後来羅豫章師龜山李延平師豫章皆以靜坐觀喜怒哀樂未發前氣象為何如而求所謂中者想其觀字亦如言聖人之能返觀非費思求索之謂必有黙㑹自得處孟子言平旦好惡雖是動亦于本心未牿之際觀之學者於此二者交用其功則天理常存善端呈見日用動靜葢有渾合自得而不自知矣易无妄心有天人兩端而已天理渾然處自有泛應端緒出来無思無為所謂道心者也若感物而動為性之欲既與物涉便有計較安排雖善惡不同均為人心也道心動皆天理真實故為无妄人心稍涉計較安排雖善亦妄矣察則决之之方敬則守之之法也君子宜慎動哉延平李氏曰虚一而靜心方實則物乘之物乘之則心動心方動則氣乘之氣乘之則感感斯不一矣喜怒哀樂皆不中節矣愚謂欲袪此病只在心有主所主又在内外一敬上蔡欲習忘以養生明道曰不可且出入起居寜無事者正心待之則先事而迎忘則忘乎去智助則近乎畱情聖人心如鑑所以異於釋氏心也艮為止止乃光明如水撓之則濁止之則清水止故泥沙定而清者存心止則物欲息而天理見故光明也天下之物水為至平雖流行不息亦各循其脉絡所在遇坎而止惟風起震蕩而後巨浪狂瀾横出掀播舟楫傾危係焉人心雖有知覺運動而體則虚明平靜如水所以翻覆暴厲頃刻易變者氣使之然也故氣順則心平心平則所以感發而為喜怒哀樂者順應而皆和矣故曰動亦靜君子志以帥氣靜以制動操其要以决其機此人心所以靈於萬物而水則隨風易動而終滯於物也人心為事物所亂故常不靜而憧憧徃来係之遂如麻喜怒無有間斷故須靜坐將客感意緒隨發隨窒使心上打摺得過纔可收囘放心以居神明之體然後隨其動靜語黙存省使此心常靜而理欲義利界限輕重取舎分明至於事親事君事長承上接下皆須於理義中出之若止靜坐恰似坐禪入定人心不可狹小須著寛大方蓄得義下𢎞廓之初要知天地萬物為一理物我藩籬之私不梏故大若義理有得只要存存不忘優柔厭飫使天機活動種種見得鳶飛魚躍氣象方是灑落若苦心極力求之反為義理束縳雖異常人恐於道無補也程子謂艮其止止其所也人多不能止各因其心之所重者更互而出愚謂人欲立功業便有功業事出来欲求名譽便有名譽事出来至於出處顯晦皆然心逐事故也聖人不逐事故出處久速皆止其所矣何動之有太極發育品彚之根寓於一元之氣故以元名易曰元者善之長言萬物之所由始也其動處生陽從根而出故曰繼之者善也至賦於人即此理寓於氣成形以有生所謂成之者性也性中五常其端為仁人具此生理於心原於太極惟真實无妄故無私曲惟充周滿腔故無空缺以生生為徳故無間斷合心虚靈故無昏昩葢統五常包萬善知故能覺生故能愛易曰仁者見之謂之仁知者見之謂之知宜知徳者鮮矣仁包四徳故惻隠亦兼四端如曰滿腔子是惻隠之心是也程子與謝上蔡論史謝面發赤程子曰此便是惻隠之心葢舉惻隠便可知羞惡矣惻隠之心孟子以為仁之端如草木根荄上有條枿勾萌自然而發正大舜所謂道心易曰動以天為无妄是也内交要譽惡其聲而然即謂人心動以人欲則妄矣知此可以求仁仁兼四徳統萬善體段氣象極大其本根於心和順充滿中無一偽之雜一私一塵之累雖人已内外曠然有容若無形骸爾汝之拘隔也故孔門罕言之雖徳行如仲弓亦不輕許其仁而惟許顔子三月不違而已其餘問仁則多以一節或用處語之子貢以博施求仁只以推已及人告之欲其因此以求全由勉而之安也大抵仁首四徳而其所施中有序如在君當仁在臣當敬在父子當慈孝之類又親親仁民愛物各得乎當然之宜所謂義也而其品節於父子君臣上下仁敬慈孝皆無有過不及而約之於天理之中粲然有文以相接所謂禮也而又炳幾察理凡於彛倫物則皆灼知其所以然而無繫閡不通之患所謂知也四者所藴所行又皆真實而無一毫虚偽以雜之所謂信也此理是一以貫串若仁少了一件便不是仁義少了一件便不是義所以易言立人之道仁義盡之矣噫人心有是而為氣質偏蔽於内物欲交奪於外自謂不能孟子所謂自賊者也可哀也哉人之受形禀性不同得仁者多慈祥和易得義者多廉隅愧恥得禮者多謙恭遜順得知者多疏通爽塏得信者多敦厚樸實五行之性亦猶是也但専一而不能相通局於偏而不能㑹充其大故人品才器分數亦終於化物而已孔子告子路成人欲集衆長而文之禮樂為是故也若不務問學又或無禮義把捉隨處放倒為和同為吝嗇為足恭為譎詐為鄙野其於天性不亦逺乎天地事物之理如水有源頭木有本根方有支流枝葉自近而逺由小而巨皆謂之理若循其近處以類而推之自得肯綮節目與中之所存為一如孟子言四端惻隠便知為仁之端之類若不去充拓只惻隠發便斷歇了春意最可觀仁陽和甘雨草木勾萌羣然秀發欣欣自私不知化工之仁並生並育者也曽㸃暮春童冠浴沂知此意矣吾儒道理須知一本為統宗㑹元萬殊為脉絡條貫仁與萬物為一體中間自有分殊須種種理㑹得在俾心源活動故其出便可望時措之宜龜山云知其理一所以為仁知其分殊所以為義上蔡云不仁便是死漢不識痛癢之人若釋氏一悟後即歸空寂無着落也孔子告顏淵問仁克已復禮如乾道庸言之信庸行之謹閑邪存其誠意告仲弓以主敬行恕如坤道敬以直内義以方外意皆以二子資性髙明淳厚近之後世質髙者既無那古人着實克已工夫必至流放惟敬義有把捉孔子以山水比擬仁知槩言其體有動靜耳然山能發生草木吞吐雲霧何靜之有水之澄潭止坎亦有静時道無専器化無停工人能凝養其心神靜觀乎天地萬物真見其活潑也謝上蔡以敬為常惺惺法有提醒昏惰之意甚是復以知覺為仁如覺痛癢之類朱子以為不覺得理底也不便是仁葢非之也要之仁兼四徳能覺能愛雖惻隠亦覺也但専以覺為仁則未可耳更當參詳之韓子以博愛為仁愛只是仁之用又博流於兼愛所以道理難説學者要知理一分殊又知去私公於物我始可以求仁矣朱子與延平論三仁事引東坡謂殷欲立微子之意涉計利害羅明仲非之而引存祀叙疇皆後来事初無此念也此何異介甫之説三仁恐如此正是病處昬了仁字此意甚瑩徹非知仁者不能如此道程子以敦䔍虚靜為仁之本葢非敦䔍則無存養以凝道非虚靜則不能照物而公溥其要只在慎獨世俗上下相接之間一套儀文皆所謂非禮之禮矣葢其中無主只管從時徇俗又為利害誘奪不能自信隨氣盈歉遂以成習所以中間尋不出真實辭讓禮来程子定性書以人之情有蔽患在自私而用知故不能適道知本人性不能明照物来而順應凡有意皆自私也自私則知非當知惟事穿鑿而於性於道日逺矣與孟子論智意同明道謂天地設位而易行乎其中只是敬也敬無間斷葢敬則仁義中正常存得立人之道人已逺近皆此敬徳流通充滿故無間斷遂與易道三才並行矣又曰毋不敬可以對越上帝敬之義大矣㢤朱子謂聖賢之學徹頭徹尾只是一敬字致知力行皆以敬而知行之愚謂敬之功如誠之理故曰物之終始理與工夫無二致若内敬而外慢始敬而終衰非所謂敬也曽子三省曰為人謀而不忠乎與朋友交而不信乎皆敬以接物工夫孔子言修已以敬而復曰安人安百姓所謂體信達順之道敬徳之極功也書曰徳惟一動㒺不吉徳二三動㒺不凶葢自人心所具為體用只是一箇理貫通天下萬事萬物而天下事理皆来就其統宗所謂天下之動貞夫一者是也其要只在敬徳葢敬則心不雜欲徳無二三而渾融於一矣先儒謂敬曰主一無適又曰主敬與易敬以直内較稍用力葢為學者求敬而言如曾子以夫子一貫之道為忠恕也書稱成湯以義制事以禮制心制有品節防維俾無過不及之意義以制之於外則事皆合於天理禮以約之於内則性皆得其中和自外以養内也禮以端莊整肅為體與易敬以直内義同葢交舉而互相發耳程子謂人心不可二用用於一事則他事不能入者事為之主也若主於敬又焉有紛擾之患乎主一之謂敬無適之謂一且欲涵泳主一之義不一則二三矣至於不敢欺不敢慢尚不愧於屋漏皆敬之事也聖賢論心曰靜葢以時言曰直以體言曰中以所存言曰正以用功言曰敬則正心之樞紐一則此徳之翕聚也朱子答吕子約以操存曰主一無適非禮不動愚謂此最切要語然主一無適為存養工夫非禮不動為省察工夫格物窮理為致知工夫義以方外為力行工夫反躬踐實亦在義方之内矣先儒反覆辨論要無出此邵子觀物外篇凡人之善惡形於言發於行人始得而知之但萌諸心發於慮鬼神已得而知之矣此君子所以慎獨也詩曰昊天曰明及爾出王昊天曰旦及爾游衍又曰神之假思不可度思亦此意主一無適之謂敬學者未能涵泳其義泥為専主故好事者從而議之若與六經所載敬義逈别葢道心本純一不雜中無妄動則不岐雜於二三心要在腔子裏畏懼收歛則不放逐於物欲故無妄動斯一矣有畏懼斯不妄適矣人所以易動而恒不得制其欲者只縁無有畏心能内尊天命之性而不敢放失外懼物欲之害而先意防閑則敬自從此起矣敬則私欲退聴而天理之心常存是謂涵養涵養之義如程子所謂菜子中許多生意只須培壅澆灌方纔得成所以成之者敬也故兢兢業業小心翼翼嚴恭寅畏克自抑畏瑟兮僩兮與戒慎恐懼同是一箇意學者要以畏為主孟子集義註以為事事皆合於義似在事上求事雖有理在然制之合理則本此心天理之當然也故一念天理則為義一念人欲則為不義必有事者葢於念慮動處省察而决其機俾人欲遏而天理常存理與事合所謂集義也義集理全則不愧不怍中此氣自㑹生自來配合故可復還天地所以與我本然至大至剛之正氣而無所虧欠乃可塞乎天地觀上章曰自反而縮下文曰心勿忘又曰行有不慊於心則餒矣其義可見百念者心之感動情之變遷緒之相因相生倚伏尋於無端至不一矣以至眇之心而填至棼之緒以有限之日而赴無窮之端悲夫况富貴利達何加於我喜怒哀樂易偏其情人欲足以蝕其天理斧其根而戕其枿者也抑孰知人生之性渾具於湛然虚靈之心本一而無雜也㢤故寅畏歛戢所以為敬也敬所以返多岐而歸之一也所以存心而養性也神明其居握其樞紐時其扃鑰以順應而不留人心焉而後一可㡬矣讀書劄記卷三
