body:
  text: 讀書劄記卷二明徐問撰周禮職方氏掌天下之圖東南曰揚州其山鎮曰㑹稽在今浙江㑹稽縣正南曰荆州其鎮曰衡山在今湖廣衡山縣河南曰豫州其鎮曰華山在今陜西華隂縣正東曰青州其鎮曰沂山在今山東臨朐縣河東曰兖州其鎮曰岱山即泰山在今泰安州正西曰雍州其鎮曰嶽山即吳嶽在今陜西隴州東北曰幽州其鎮曰醫無閭在今遼東廣寧衛河內曰冀州其鎮曰霍山在今山西霍州正北曰並州其鎮曰恆山在今大同府渾源州是槩言九州之山鎮也不言徐州疑併入於青不言梁州疑併入於雍豫也詩嵩高注以南嶽為霍山職方以為衡山葉氏曰漢元封五年巡南郡禮天柱山一統志衡山有天柱峯六安州有霍山一名衡山一名天柱即漢武帝所封號曰南嶽是以衡山神逺移於霍山也以為一山兩名者失之王制有恆山衡山而不言太華嵩山以南北所至山而言舜典有四嶽而不言中嶽以巡守所至四方而言泰山為東嶽華山為西嶽恆山為北嶽衡山為南嶽嵩高為中嶽蓋禹貢之方外也職方不言嵩高周在五嶽之外以雍之吳山為嶽山皆有不同五代失河北之地至宋未能混一北為契丹所有乃以真定府曲陽縣之恆山為北嶽國初定鼎建康祀典肇以泰山為東嶽沂山為東鎮衡山為南嶽㑹稽山為南鎮華山為西嶽吳山為西鎮真定之恆山為北嶽醫巫閭山為北鎮嵩山為中嶽霍州之霍山為中鎮後遷都北平則真定在其南故仍以渾源州之恆山為北嶽其餘嶽鎮皆如舊云臨川吳氏曰天下山脉起於崑崙山脉之所起即水源之所發也朱子曰河圖言崑崙地之中也又曰冀都山脉從雲中發來蓋太行山一千里河東河北太原晋陽諸州皆左旋其趾山後即欣代諸州上黨即今潞州春秋為赤狄潞氏其地極高與天為黨故曰上黨過河便見山在半天如黑雲然故曰雲中自脊以西之水則西流入於龍門西河以東之水則東流入於海前靣一條黃河環繞平陽即河中府蒲坂山之盡處堯舜之所都也泰山聳於左為龍右畔是華山聳立為虎自華至中嵩山嵩為中嶽獨高當天之中又曰泰室在河南登封縣為前案淮南諸山是第二重案江南諸山及五嶺大庾始安臨賀桂陽揭陽又為第三四重案又曰前代多都關中以黃河左右旋繞近東止有函谷關一路可據為險其山皆自蜀漢來至長安而盡又曰天下之山西北最高自關中一支生下函谷以至嵩少東盡泰山又自嶓冢漢水之北生下一支至揚州而盡又曰岷山之脉其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘衡嶽之間源而北經袁江西袁州潭之境以盡於廬阜匡廬在南康其一支又南而東度庾嶺即梅嶺屬江西大庾縣者則包彭蠡之源以北盡於建康今南京其一支則東包浙江之源而北其首以盡㑹稽南其尾以盡閩粵廣東也又曰仙霞嶺在信州今廣信府分水之右其脊脉發去為臨安今杭州山從天目山發來又發去為建康又曰江西山皆自五嶺贑上來自南而北故皆逆閩中郤是自北而南故皆順又曰閩中之山多自北來水皆東南流江浙之山多自南來水皆北流故江浙冬寒而夏熱愚謂古今言方輿者必本之山川蓋以山為巨鎮水為藪澤建邦樹都恆守之以為固先儒謂山為水之綱水為山之紀而洪河大山亦天地間大界限也然論險者每言關中左殽函右隴蜀為四塞之地東制諸侯如建瓴水而楚漢以後爭天下者常得斬關而入次言巴蜀劒門為天下壯而晉鄧艾之兵從隂平趨涪卒亡後主易曰天險不可升也地險山川丘陵也孟子曰域民不以封疆之界固國不以山溪之險傳曰天子有道守在四夷至今讀其言尤信潮汐古洲馬氏取禮記致日曰朝致月曰夕江海之水朝生為潮夕至為汐日太陽也歷一次而成月月太隂也合於日以起朔隂陽消息晦朔絃望潮汐應焉水隂物也而生於陽潮汐依日而滋長隨月而漸移日起於朔月盈於望月東行迎日之所次月合於地下之中則日之所次也故潮平於地下之中而㑹於月朔後三日明生而潮壯望後三日魄見而汐湧每嵗仲春月落水生而汐微仲秋月明水落而潮倍减於大寒極隂而凝弱於大暑畏陽而縮消長不失其時故曰潮信邵子曰海潮地之喘息也所以應之者月從其類也朱子曰天地間東西為緯南北為經故子午卯酉為四方之正位而潮之進退以月至此位為節耳黃瑞節曰先儒論潮則謂天包水水乘地而一元之氣升降於太虛之中地乘水力與元氣相為升降氣升地沉則海水溢上而為潮氣降地浮則海水縮而為汐其說與地氣四遊春夏秋冬升降不越三萬里相為表裏而獨取余襄公海潮圖序以為潮之消息皆繫於月月臨卯酉則潮長乎東西月臨子午則潮長乎南北一月則潮盛乎朔望之後一嵗則潮盛乎春秋之中此潮之消息乃繫乎月之進退亦非因地之浮沉也愚謂以上諸說皆不同但天一生水體隂而生於陽周流進退於地之外天之中恐未可專以繫月為消息也若以為元氣升則地沉而水溢氣降則地浮而水縮則原隰地形古今如故未嘗有見其沉浮也朱子經緯之說蓋天地間一大條段五行之氣皆消息盈虛其間而况於水乎但月加子午陳氏既已疑之而卯酉則日月升沉之處也惟馬氏以日月晦朔隂陽消息潮汐應焉似為有理又以月東行迎日之所次於地中水㑹月而生潮及日行一度月行十三度皆本諸舊與余襄公序說同要之水為天地脉絡隂陽所鍾消息盈虛與元氣相為循環終始雖類從於月而其氣未嘗不通於日况月臨卯酉亦日𤾉谷崦嵫升沒之候而月得太陽之精而有光水因朔望之光而生潮則其氣機感動未始不相因也故月合朔隂陽之精所㑹而為辰氣進而長水為浮物與氣升降而為潮春秋時當水盛故潮尤大嘗聞之江海居人遇潮之日雖瓶􅎆注水皆浮溢而出於理亦可見矣素問曰天不足西北地不滿東南蓋地西北高東南下江海百川所聚海水周於地之四維其流東極氣盡故歸墟尾閭如沃焦釜北海路最遙至極盡處疑與天浮接也東有女直為黑水鞨靺之後國有長白山其巔有潭周八十里南流至遼東朝鮮國為鴨緑江南入於海北流為女直混同江經金㑹寧府達五國頭城北東入海西有黑水出漢張掖郡雞山今甘州南至燉煌今肅州過三危界梁雍二州之間程子以為即西珥河與漢志葉榆澤相貫漢武開滇嶲今雲南為滇池其地古有黑水舊祠而知之但今水渟滀不入南海也中原之水惟黃河來最逺考禹貢注及諸儒說黃河一自于闐國葱嶺一自西吐蕃之崑崙山發源合流二萬一千三百餘里東北與積石河合屬漢金城郡西南羌中而至龍門河渠志一統志皆云出今西畨朵甘衛西直四川馬湖蠻部正西三千餘里去雲南麗江西北一千五百里有水從地湧出泓方七八十里高瞰之若星列俗傳為星宿海尋匯為二大澤復瀦曰哈刺海東出曰赤賔河合忽蘭也里术二河東北流經崑崙山之南為九渡河水清騎可涉貫山中行西戎都㑹為細黃河水流已濁繞崑崙山之南折而東流合乞里馬出河復繞崑崙之北自貴德西寧之境至積石經河州屬陜西合洮河東北流至蘭州始入中國又東北出沙漠經三受降城東勝諸州又折而東南入冀州今山西境凡九千餘里乃元學士蒲察篤實所窮歷而得之大學衍義補亦據此當以志為定禹治水時河從積石東北而南計三千里至龍門為西河冀州吕梁山石勢崇竦其流激震禹從吕梁北鑿龍門以殺水勢乃因其西流之性而導之又南而至華隂在陜之華隂縣自南而東至底柱在河南陜州之三門山又東經孟津河南府孟津縣過洛汭鞏縣至於大伾大名府濬縣臨河之山北過洚水真定冀州北枯降渠至於大陸屬中山郡今真定邢趙深三州之地北分其勢播之為九河復同聚一處為逆河蓋迎之以入于海簡潔一水先儒誤分而二其一則河之經流也徒駭等河故道皆在河間滄州南皮東光慶雲獻縣山東平原海豐由寧津吳橋南皮諸處直達東海周定王五年河徙砱礫始失故道漢文帝時决酸棗東潰金隄在河南延津滎陽諸縣至大名清豐一帶延亘千里武帝時溢平原屬德州徙頓丘今清豐縣又决濮陽瓠子口開州界注巨野屬濟寧州即大野通淮泗河始與淮通尚未入淮元帝時决館陶舊屬大名今屬臨清又决清河靈鳴犢口今高唐州舊屬清河郡成帝時决東郡金隄决平原溢渤河清河高唐州一帶信都今冀州界唐𤣥宗時决博州今東昌溢魏州今大名冀州五代時决鄆州今鄆城縣博之楊劉今東平之東阿縣楊劉鎮滑之魚池宋太祖時决東平之竹村開封之陽武大名之靈河澶淵太宗時决溫縣滎澤頓丘泛於澶濮曹濟諸州東南流至彭城界即今徐州入于淮自此河入淮之始真宗時决鄆及武定州尋溢滑澶濮曹鄆諸州邑浮於徐濟而東入淮仁宗時决開州館陶神宗時决冀州棗强大名州邑一合南清河以入淮一合北清河以入海南渡後河上流諸郡為金所據金獨受河患其亡也始自開封北衛州决而入渦河南直𨽻夀亳蒙城懷逺之間元時决衛輝之新鄉開封之陽武杞縣之蒲口滎澤之塔海莊歸德封丘諸界其臣建議疏塞若今㑹通河乃世祖所開以通漕運隨時救敝而已當時九河逆河故道久已淪入于海滄州接平州程子以為正南山有名碣石者在海中去岸五百里今平原有馬頰河形存沙渠其跡尚可考大伾之北不行矣我朝洪武中决陽武之黑陽山東經開封南至頓城潁州潁上東至夀州正陽鎮全入於淮故道復淤永樂中疏濬稍引支流自金龍口入臨清㑹通河正統間又决滎陽天順間决祥符𢎞治間分流為二一自祥符經歸德至徐邳入淮一自荆隆黃陵岡經曹濮達張秋鎮入海尋命重臣治築黃陵岡等口以塞張秋乃疏為二流一鑿蒙澤孫家渡至朱仙鎮經扶溝通許夀潁諸州邑合渦河至下鳯陽亳州達淮一疏賈魯舊河由曹州出徐沛以通運河合淮俱入于海正德間决曹縣者再嘉靖間河嵗為兖患屢遣重臣治未底績河流漫入於曹縣濫溢於魚臺出沛縣之飛雲橋南下徐邳十三年復塞由新開趙皮寨口盛流合渦河入淮故道今始復矣雍州之水自西近塞內玉門關至蘭州北東至華隂皆黃河繞帶又有弱渭涇汭漆沮灃諸水弱水出吐谷渾界窮石山自張掖郡山丹縣西至合黎山與張掖河合餘波入于流沙涇出平凉府岍頭山經西安府邠州涇陽至馮翊陽陵縣今高陵縣入渭渭出渭源縣鳥鼠山西北谷流入咸陽南至華隂入河汭出隴州弦蒲藪入涇漆出扶風古漆縣北經同官至耀州南合沮沮自坊州升平縣北子午嶺延安府宜居縣出富平縣合漆灃出扶風鄠縣終南山亦東至咸陽俱合㑹同入於河冀州之水黃河自陜西西北來經古蒲汾水之間又有汾衡漳恆衛沁諸水蔡傳以汾出山西太原靜樂縣太嶽即霍山至平陽府靈石縣東入河漳水二一出上黨之沾縣大龜谷太原府樂平縣名為清漳一出上黨之長子縣發鳩山屬潞州今改潞安府名為濁漳即衡水俱東北流至河間阜城東光縣入海恆水出真定之曲陽縣東入滱水至保定之高陽縣入易水朝氏以西南流至真定行唐縣東流入滋水南流入衡水衡出真定靈夀縣東入滹沱河恆水在陜西者出吐谷渾界入臨洮因名洮水入於黃河在真定者出衛輝府輝縣滱水出渾源州恆山南流入真定之定州至保定高陽合易水易出代州經保定之易州安州至高陽下與曹徐滋沙諸河合至雄縣南為瓦濟河過直沽入海滋則出大同府之靈丘縣回山經真保之行唐無極深澤諸縣東南流滹沱河出鴈門代州東流從真定至束鹿深州青縣合輝縣之衛河俱入海幽并州之水曰玉河出玉泉山經大內出都城注大通河至白河與盧溝河合盧溝河出大同府桑乾山經太行山入今順天宛平縣界出盧溝橋東南至看丹口分兩流一至通州入白河一經固安武清縣至直沽與衛河合分南北入海白河出密雲流入通州與盧溝河潞河合潞河自塞外丹花嶺分流合螺山鮑丘諸水為東西二河俱合流入海沁水發大行山東北經輝縣合衛河入運又東南流下徐吕二洪合黃河入淮豫州之水黃河自山西蒲州平陸入境經河南之閿鄉靈寶陜澠池新安濟源孟津孟鞏溫汜水武涉河隂原武滎澤陽武中牟祥符尉氏陳留通許杞太康雎寧歸德諸州縣至南直𨽻鳯陽亳縣合馬腸河城西北合渦河其支流有四大槩交錯於祥符尉氏扶溝商水項城通許太康與南直𨽻夀州朱仙鎮之間或溢兖州出沛或合渦河入淮又有伊洛瀍澗滎波孟豬濟衛淮諸水伊出盧氏縣東南書傳以出熊耳此山在盧氏之西南恐誤入於洛洛出陜西冡領山亦經洛陽縣瀍出洛陽榖城山澗出澠池白石山經新安縣皆㑹於洛合流至鞏縣入河濟即沇水出懷慶府濟源縣王屋山二源分東西流歷虢公臺至溫縣入河復出其南溢而為滎即滎澤東出於陶丘之北在館陶縣又東至于菏在今曹州地已涸東北㑹于汶即今汶上縣又北東入于海波為洛水别流孟豬在虞城西北濟之别流衛出河南衛輝府輝縣從大名之內黃濬縣出與滹沱淇漳諸水合臨清之㑹通河北流至直沽淮出唐縣東南經桐柏山潛流三十里復東出經汝信東流㑹沂泗俱入海兖州之水其地最下今曹魚為黃河下流又有濟漯濼雷夏灉沮汶泗淄灉濟出河南濟源漯出濟南之長山縣長白山西北流經章丘新城諸界濼出歷城縣入濟雷夏澤在濮州雷澤縣灉沮二水之别流自陳留浚儀隂溝至蒙為灉東入於泗泗出兖之泗水縣陪尾山經曲阜至濟寧分流南入徐州北入㑹通河又出巨野受泲水下流於雎即沮水汶有三源至泰安州靜封鎮合而為一經寧陽平隂汶上又西至東平州注於濟經東阿濟寧入㑹通河淄水出今青州萊蕪縣原山達臨淄東至夀光灉水出琅邪郡今諸城縣經高密昌邑濰縣東北俱入海荆州之水其澤藪曰雲夢跨江南北八百里又有江漢川九江沱潛江水發源於梁州四川之岷山青城諸山之陽出今茂州汶川縣東别為沱經敘瀘重夔入瞿峽過巫山出湖廣夷陵州荆州至於東陵嶽州府巴陵縣合洞庭過漢陽府合漢水至黃州江西九江府合彭蠡鄱陽湖口經安慶池州太平應天諸府儀真通州入海漢出陜西漢中嶓冡山之下始為氐道縣東源漾水東至武都為漢過武東今武當縣中州為滄浪之水過三澨即郢州今承天府至於大别山今漢陽入江經黃州九江合鄱湖諸水同趨入海九江孔氏以為潯陽非是沅辰漸元敘酉澧資湘九水是為九江皆合於洞庭過巴陵合川水入武昌合漢水東南下入揚子江衝北岸甚急與江水俱入於海揚州之水北至於淮東南至於海東合江西江東諸水經豫章之南贑汀吉合衡永長沙别派入袁州出臨江㑹贑水入洪都合瑞洪所聚饒撫信浙之諸水于鄱陽今江西九江府蓋名其入口處與前江漢諸水同趨建康今南京蓋諸方水道所凑東南合蘇松常三郡水匯而為震澤在吳縣南五十里又吐納常之宜興江隂鎮之金壇百瀆西來衆水而下溢為三江吳江界於吳松江震澤之間去吳松江七十里分東北流者為婁江東南流者為東江皆自常之靖江蘇之太倉東北入海北為江北通泰至海門縣而入海所謂江漢朝宗者也禹時江淮未通賦㳂于海至吳夫差與晉㑹盟黃池始開蘇之䢴溝今為運河自常之孟瀆鎮之京口以通於江江自揚之儀真亦開溝以通於淮隋因廣之今貢賦皆自江淮以達于京師也二廣古百粵漢交州部廣西之水一曰灕江源出海陽山南流五里與永州湘水北分為二故曰灕又名桂江合癸水至桂林城下合相思江入昭潭今平樂府㑹平富樂荔臨賀諸水至梧州為府江一曰左江又名藤江發源交趾至古雍州今思明府經容縣合容江經藤縣合繡江經南寧之合江鎮與右江合入橫州又名鬱江一名右江又曰黔江源出雲南廣南府之富州西洋江入廣西田州經象州今柳州合栁江至南寧府之合江鎮與左江合二江合入潯州大藤峽出為潯江貴州古羅施鬼國其水曰盤江源出四川烏撒府普暢寨東經古夜郎地又為黔中𨽻牂牁郡今普安州東北下流入安南衛經廣西泗城州入慶逺府烏泥江下合柳江即為右江以上三江分合為二入梧州大江即漢武使馳義侯發夜郎兵下牂牁江是也西流經廣東封川德慶合肇慶之端溪江又名西江至番禺流入於南海廣東省之東南皆大海其水一出惠州博羅縣西流者為東江一出江西大庾嶺即梅嶺者為湞水漢武時楊僕為樓船將軍擊南越出豫章下湞水即此至韶之英德為湞陽峽一出湖廣郴州經武岡南入南雄之樂昌為武水又南與湞水合而為曲江過三水縣與西江合即上漢謂牂牁江也皆合至於南海縣入于海雲南古西南夷僰鳩地其水曰滇池周五百餘里出澄江嵩明盤龍等江九十九泉源廣末狹若倒流者故云滇漢武欲伐滇國於長安穿昆明池象滇以習水戰故亦以為昆明誤也大理之葉榆河即西洱海及瀾滄諸江其流不出本省惟廣南西洋江則由廣西經右江入於海其四海之水北海極逺不可窮東北至於朝鮮東至於登萊東南至於閩浙島夷日本流球南至交廣瓊崖又南至於安南占城真臘等夷國而西南至於交址云讀書劄記卷二
